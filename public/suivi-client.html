<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <title>Suivi de votre prestataire - PetitsDjobs</title>
</head>
<body class="tracking-body">
    <div id="map"></div>

    <div class="floating-top-info">
        <h2 id="status-mission" style="font-size: 1.1rem; margin: 0; color: #333;">Suivi en cours</h2>
        <p id="mission-info" style="color:#666; font-size: 0.85rem; margin: 3px 0 0;">Votre prestataire est en route</p>
    </div>

    <div class="floating-bottom-actions">
        <div id="gps-info" style="font-weight: bold; margin-bottom: 15px; color: #ff5252; font-size: 1rem;">Localisation du prestataire...</div>
        
        <button id="btn-client-arrive" onclick="clientMarquerArrivee()" class="btn-primary-sm" style="display:none; background:#2e7d32; width:100%; height:50px;">L'INTERVENANT EST ARRIVÉ</button>
        <button id="btn-client-sos" onclick="declencherSOS()" class="btn-danger" style="display:none; background:#b71c1c; width:100%; height:50px;">🆘 SIGNALER UN DANGER</button>
        <button id="btn-client-depart" onclick="clientConfirmerDepart()" class="btn-primary-sm" style="display:none; background:#333; width:100%; height:50px;">VALIDER LE DÉPART ET PAYER</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        let map, markerMe, markerProvider, missionId, routingControl;
        let lastDist = null;

        function parler(txt) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'fr-FR';
                window.speechSynthesis.speak(u);
            }
        }

        const iconMe = L.divIcon({ className: 'custom-icon', html: '<div style="background:#ff5252; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(255,82,82,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
        const iconPro = L.divIcon({ className: 'custom-icon', html: '<div style="background:#007bff; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,123,255,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });

        function init() {
            map = L.map('map', { zoomControl: false, dragging: true }).setView([0, 0], 18);
            
            // Style "Maps" Vectoriel épuré (CartoDB Voyager) au lieu de satellite
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '©OpenStreetMap ©CartoDB'
            }).addTo(map);
            
            markerMe = L.marker([0, 0], { icon: iconMe }).addTo(map);
            markerProvider = L.marker([0, 0], { icon: iconPro }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [],
                lineOptions: { styles: [{ color: '#007bff', opacity: 0.6, weight: 6 }] },
                createMarker: () => null,
                addWaypoints: false,
                show: false,
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
            }).addTo(map);

            fetch('/get-session-commande').then(r => r.json()).then(cmd => {
                missionId = cmd.missionId;
                parler("Suivi activé. Votre prestataire arrive.");
                startGPS();
                setInterval(pollProvider, 2000);
                setInterval(checkStatus, 2000);
            });
        }

        function startGPS() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                markerMe.setLatLng([lat, lon]);
                if (!map.getCenter().lat) map.setView([lat, lon], 18);
                
                document.getElementById('mission-info').innerText = `Signal GPS : ±${Math.round(accuracy)}m`;
                
                fetch('/sauvegarder-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon })
                });
            }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }

        function pollProvider() {
            fetch('/api/suivi-prestataire-gps?missionId=' + missionId).then(r => r.json()).then(pos => {
                if (pos.lat) {
                    const pPos = L.latLng(pos.lat, pos.lon);
                    markerProvider.setLatLng(pPos);
                    
                    const myPos = markerMe.getLatLng();
                    if (myPos.lat !== 0) {
                        routingControl.setWaypoints([pPos, myPos]);
                        const dist = Math.round(myPos.distanceTo(pPos));
                        document.getElementById('gps-info').innerHTML = `🛵 Prestataire en approche : <strong>${dist} m</strong>`;
                        
                        if (dist < 100 && (!lastDist || lastDist >= 100)) {
                            parler("Le prestataire est à moins de cent mètres.");
                        }
                        lastDist = dist;
                        if (!map.getBounds().contains(pPos)) map.panTo(pPos);
                    }
                }
            });
        }

        async function checkStatus() {
            const res = await fetch('/api/statut-mission?missionId=' + missionId);
            const data = await res.json();
            
            const btnArrive = document.getElementById('btn-client-arrive');
            const btnSos = document.getElementById('btn-client-sos');
            const btnDepart = document.getElementById('btn-client-depart');

            if (data.statut === 'en_route') {
                btnArrive.style.display = 'block';
            } else if (data.statut === 'travail_en_cours') {
                btnArrive.style.display = 'none';
                btnSos.style.display = 'block';
                document.getElementById('status-mission').innerText = "Intervention en cours";
            } else if (data.statut === 'attente_securite') {
                btnSos.style.display = 'none';
                btnDepart.style.display = 'block';
                document.getElementById('status-mission').innerText = "Tâche terminée";
            } else if (data.statut === 'termine') {
                alert("Mission terminée avec succès !");
                window.location.href = '/index.html';
            }
        }

        async function clientMarquerArrivee() {
            await fetch('/api/marquer-arrivee', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
        }

        async function clientConfirmerDepart() {
            await fetch('/api/confirmer-depart', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
        }

        async function declencherSOS() {
            if (confirm("🚨 SIGNALER UN DANGER ?")) {
                const pos = markerMe.getLatLng();
                await fetch('/alerte-sos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ lat: pos.lat, lon: pos.lng }) });
                alert("Sécurité prévenue.");
            }
        }

        init();
    </script>
</body>
</html>
