<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <title>Suivi de votre prestataire - PetitsDjobs</title>
</head>
<body class="tracking-body tracking-client">
    <div class="loader-gps" id="main-loader"></div>
    <div id="map"></div>

    <!-- Bandeau Chat Global (même dans le suivi) -->
    <div id="global-chat-notif" style="display:none; position:fixed; top:100px; left:10px; right:10px; background:white; border:2px solid #FF6600; border-radius:15px; padding:12px; z-index:11000; box-shadow:0 10px 30px rgba(0,0,0,0.2); animation: slideDownNotif 0.4s ease; cursor:pointer;" onclick="openChatFromNotif()">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:#FF6600; color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;">💬</div>
            <div style="flex:1;">
                <div style="font-weight:900; color:#FF6600; font-size:0.7rem;">NOUVEAU MESSAGE</div>
                <div id="notif-chat-sender" style="font-size:0.85rem; font-weight:bold;">...</div>
            </div>
            <button onclick="event.stopPropagation(); document.getElementById('global-chat-notif').style.display='none'" style="background:#eee; border:none; width:25px; height:25px; border-radius:50%;">✕</button>
        </div>
    </div>

    <div class="floating-top-info tracking-client-top" style="background: white; border: 2px solid #FF6600; display: flex; align-items: center; gap: 12px;">
        <div style="position: relative; width: 55px; height: 55px; flex-shrink: 0;" onclick="document.getElementById('upload-avatar').click()">
            <img id="client-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08c-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" 
                 style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #FF6600; background: #f9f9f9; cursor: pointer;">
            <div style="position: absolute; bottom: 0; right: 0; background: #FF6600; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid white; font-weight: bold;">+</div>
            <input type="file" id="upload-avatar" style="display: none;" accept="image/*" onchange="changerMaPhoto(this)">
        </div>
        <div style="flex: 1;">
            <h2 id="status-mission" style="font-size: 1.05rem; margin: 0; color: #FF6600;">Suivi de votre prestataire</h2>
            <p id="mission-info" style="color:#2e7d32; font-size: 0.8rem; margin: 3px 0 0; font-weight: bold;">Attente du signal GPS…</p>
        </div>
        
        <div class="nav-actions-top">
            <button onclick="location.href='/chat.html?missionId='+missionId" class="btn-primary-sm btn-nav" style="background:#FF6600;">💬 CHAT</button>
            <button id="btn-client-arrive" onclick="clientMarquerArrivee()" class="btn-primary-sm btn-nav" style="display:none; background:#2e7d32;">IL EST ARRIVÉ</button>
            <button id="btn-client-fin" onclick="clientDemandeFin()" class="btn-primary-sm btn-nav" style="display:none;">TÂCHE FINIE</button>
            <button id="btn-client-depart" onclick="document.getElementById('modal-notation').style.display='flex'" class="btn-primary-sm btn-nav" style="display:none; background:#FF6600;">VALIDER DÉPART</button>
            <button id="btn-client-sos" onclick="declencherSOS()" class="btn-danger btn-nav" style="display:none;">🆘 SOS</button>
        </div>
    </div>

    <div class="floating-bottom-actions">
        <div id="gps-info" style="font-weight: 800; margin-bottom: 8px; color: #2e7d32; font-size: 1.2rem;">Recherche du prestataire…</div>
        <div id="gps-eta-client" style="font-size: 0.85rem; color: #FF6600; font-weight: 700; margin-bottom: 12px;"></div>
    </div>

    <!-- Modal de notation -->
    <div id="modal-notation" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; padding:20px; box-sizing:border-box;">
        <div class="login-card" style="max-width:400px; text-align:center;">
            <h2 style="color:#FF6600; margin-top:0;">MISSION TERMINÉE !</h2>
            <p style="font-size:0.9rem; color:#2e7d32;">Notez la prestation (10 petites étoiles = 1 grande étoile)</p>
            
            <div id="star-rating" style="display:flex; justify-content:center; gap:4px; margin:20px 0; font-size:1.8rem; cursor:pointer; color:#ccc;">
                <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                <span data-v="6">★</span><span data-v="7">★</span><span data-v="8">★</span><span data-v="9">★</span><span data-v="10">★</span>
            </div>
            
            <textarea id="note-commentaire" placeholder="Un petit commentaire sur le travail ?" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px; box-sizing:border-box; min-height:80px;"></textarea>
            
            <button onclick="envoyerNote()" class="btn-primary-sm" style="width:100%; padding:15px;">ENVOYER MA NOTE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        let map, markerMe, markerProvider, missionId, prestataireId, routingControl;
        let lastDist = null;
        let noteSelectionnee = 0;
        let hasCentered = false;
        let followProvider = true;

        function haversineM(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function formatDist(m) {
            return m < 1000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km';
        }

        // Client (Moi) en ORANGE
        const iconMe = L.divIcon({ className: 'custom-icon', html: '<div style="background:#FF6600; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px rgba(255,102,0,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
        // Prestataire en VERT
        const iconPro = L.divIcon({ className: 'custom-icon', html: '<div style="background:#2e7d32; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px rgba(46,125,50,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });

        function logDebug(msg) {
            console.log("[DEBUG CLIENT] " + msg);
            document.getElementById('mission-info').innerText = msg;
        }

        // Gestion visuelle des étoiles
        document.getElementById('star-rating').addEventListener('click', e => {
            if (e.target.dataset.v) {
                noteSelectionnee = parseInt(e.target.dataset.v);
                const stars = document.querySelectorAll('#star-rating span');
                stars.forEach((s, idx) => {
                    if (idx < noteSelectionnee) {
                        s.style.color = "#FF6600"; // Orange PetitsDjobs
                    } else {
                        s.style.color = "#ccc";
                    }
                });
            }
        });

        async function changerMaPhoto(input) {
            if (!input.files || !input.files[0]) return;
            const formData = new FormData();
            formData.append('photo', input.files[0]);

            document.getElementById('client-avatar').style.opacity = "0.5";
            
            const res = await fetch('/api/update-profile-photo', {
                method: 'POST',
                body: formData
            });
            
            const data = await res.json();
            if (res.ok) {
                document.getElementById('client-avatar').src = data.url;
                alert("Photo mise à jour ! Elle sera visible dans le chat.");
            } else {
                alert("Erreur lors de l'envoi.");
            }
            document.getElementById('client-avatar').style.opacity = "1";
        }

        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });

        function init() {
            map = L.map('map', { zoomControl: false, dragging: true }).setView([0, 0], 18);
            
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);
            
            markerMe = L.marker([0, 0], { icon: iconMe }).addTo(map);
            markerProvider = L.marker([0, 0], { icon: iconPro }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [],
                lineOptions: { 
                    styles: [
                        { color: 'white', opacity: 0.6, weight: 12 },
                        { color: '#2e7d32', opacity: 1, weight: 7, dashArray: '10, 15' } // Guidage en pointillés verts
                    ] 
                },
                createMarker: () => null,
                addWaypoints: false,
                show: false,
                router: L.Routing.osrmv1({ serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1' }),
                routeWhileDragging: true // Permet de recalculer la route si les marqueurs sont déplacés (utile pour le debug)
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;

                // Ajout de la flèche dirigée vers le client (fin de la ligne)
                if (window.arrowDecorator) map.removeLayer(window.arrowDecorator);
                window.arrowDecorator = L.polylineDecorator(routes[0].coordinates, {
                    patterns: [
                        {offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({pixelSize: 15, polygon: false, pathOptions: {stroke: true, color: '#2e7d32', weight: 4}})}
                    ]
                }).addTo(map);

                const instructions = routes[0].instructions;

                const distM = summary.totalDistance;
                const label = formatDist(distM);
                document.getElementById('gps-info').innerHTML = `🛵 Prestataire à <strong>${label}</strong>`;
                document.getElementById('gps-eta-client').innerText = distM < 1000
                    ? `Arrivée estimée dans ~${Math.max(1, Math.round(distM / 80))} min`
                    : 'En route vers vous';
                
                // Affiche les instructions de direction (les "flèches") en texte
                if (instructions && instructions.length > 0) {
                    const nextStep = instructions[1] || instructions[0];
                    document.getElementById('mission-info').innerHTML = `<b>Prochaine étape :</b> ${nextStep.text}`;
                }

                verifierProximite(distM);
            });

            fetch('/get-user-data').then(r => r.json()).then(user => {
                if (user.photo) {
                    document.getElementById('client-avatar').src = user.photo;
                }
            });

            fetch('/get-session-commande').then(r => r.json()).then(cmd => {
                const urlMissionId = new URLSearchParams(location.search).get('missionId');
                missionId = urlMissionId || cmd.missionId;
                prestataireId = cmd.prestataireId;
                if (!missionId) {
                    logDebug("Mission ID introuvable.");
                    return;
                }
                logDebug("Suivi mission " + missionId + " prêt.");
                setInterval(pollProvider, 2000);
                setInterval(checkStatus, 2000);
                startGPS();
            }).catch(e => logDebug("Erreur session: " + e.message));
        }

        let isProcessingArrivee = false;

        function startGPS() {
            const gpsOptions = {
                enableHighAccuracy: true,
                maximumAge: 3000,
                timeout: 15000
            };

            navigator.geolocation.watchPosition(pos => {
                document.getElementById('main-loader').style.display = 'none';
                
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                logDebug(`GPS Client OK (±${Math.round(accuracy)}m)`);

                markerMe.setLatLng([lat, lon]);
                
                if (!hasCentered) {
                    map.setView([lat, lon], 18);
                    hasCentered = true;
                }
                
                fetch('/sauvegarder-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon })
                });
            }, (err) => logDebug("Erreur GPS: " + err.message), gpsOptions);
        }

        function pollProvider() {
            fetch('/api/suivi-prestataire-gps?missionId=' + missionId, { cache: 'no-store' }).then(r => r.json()).then(async pos => {
                if (pos.lat) {
                    logDebug("Position prestataire reçue.");
                    const pPos = L.latLng(pos.lat, pos.lon);
                    markerProvider.setLatLng(pPos);
                    
                    const myPos = markerMe.getLatLng();
                    if (myPos.lat !== 0 && myPos.lng !== 0 && pPos.lat !== 0 && pPos.lng !== 0) {
                        routingControl.setWaypoints([pPos, myPos]);
                        const dist = haversineM(pPos.lat, pPos.lng, myPos.lat, myPos.lng);
                        document.getElementById('gps-info').innerHTML = `🛵 Prestataire à <strong>${formatDist(dist)}</strong>`;
                        document.getElementById('gps-eta-client').innerText =
                            dist < 80 ? 'Il arrive !' : `~${Math.max(1, Math.round(dist / 80))} min à pied`;
                        if (followProvider && !map.getBounds().contains(pPos)) map.panTo(pPos);
                    }
                }
            });
        }

        async function verifierProximite(dist) {
            // ACTIVATION AUTOMATIQUE si distance < 50m (à pied)
            if (dist < 50 && !isProcessingArrivee) {
                const resStat = await fetch('/api/statut-mission?missionId=' + missionId);
                const dataStat = await resStat.json();
                if (dataStat.statut === 'en_route') clientMarquerArrivee();
            }
            lastDist = dist;
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/statut-mission?missionId=' + missionId);
                if (!res.ok) return;
                const data = await res.json();
                if (!data || !data.statut) return;
                
                const btnArrive = document.getElementById('btn-client-arrive');
                const btnFin = document.getElementById('btn-client-fin');
                const btnSos = document.getElementById('btn-client-sos');
                const btnDepart = document.getElementById('btn-client-depart');
                const statusTxt = document.getElementById('status-mission');
                const gpsInfo = document.getElementById('gps-info');

                // Si le client vient de cliquer sur "Arrivée", on ne réaffiche pas le bouton pendant 2 sec
                if (isProcessingArrivee && data.statut === 'en_route') return;

                // Gestion propre de l'affichage : on définit l'état de chaque bouton pour chaque statut
                switch(data.statut) {
                    case 'en_route':
                        btnArrive.style.display = 'block';
                        btnFin.style.display = 'none';
                        btnDepart.style.display = 'none';
                        statusTxt.innerText = "Le prestataire arrive...";
                        break;
                    case 'travail_en_cours':
                        btnArrive.style.display = 'none';
                        btnFin.style.display = 'block';
                        btnSos.style.display = 'block';
                        btnDepart.style.display = 'none';
                        statusTxt.innerText = "Intervention en cours";
                        break;
                    case 'attente_securite':
                        btnArrive.style.display = 'none';
                        btnSos.style.display = 'none';
                        btnDepart.style.display = 'block';
                        statusTxt.innerText = "Tâche terminée - Départ en attente";
                        break;
                    case 'termine':
                        alert("Mission terminée avec succès !");
                        window.location.href = '/index.html';
                        break;
                    default:
                        // Par sécurité, on cache tout si le statut est inconnu
                        btnArrive.style.display = 'none';
                        btnSos.style.display = 'none';
                        btnDepart.style.display = 'none';
                        break;
                }
            } catch (err) {
                console.error("Erreur polling statut:", err);
            }
        }

        async function clientMarquerArrivee() {
            const btn = document.getElementById('btn-client-arrive');
            btn.disabled = true;
            btn.innerText = "CHARGEMENT...";
            
            const res = await fetch('/api/marquer-arrivee', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });

            if (res.ok) {
                btn.style.display = 'none';
                isProcessingArrivee = true;
                setTimeout(() => { isProcessingArrivee = false; checkStatus(); }, 2500);
            } else {
                btn.disabled = false;
                btn.innerText = "L'INTERVENANT EST ARRIVÉ";
            }
        }

        async function clientDemandeFin() {
            if (confirm("Confirmez-vous la fin de la tâche ?")) {
                await fetch('/api/terminer-tache-client', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ missionId }) 
                });
            }
        }

        async function clientConfirmerDepart() {
            const btn = document.getElementById('btn-client-depart');
            btn.disabled = true;
            
            await fetch('/api/confirmer-depart', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
        }

        async function envoyerNote() {
            if (noteSelectionnee === 0) return alert("Veuillez sélectionner une note.");
            const commentaire = document.getElementById('note-commentaire').value;
            
            await fetch('/api/noter-prestataire', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ missionId, prestataireId, note: noteSelectionnee, commentaire })
            });
            window.location.href = '/index.html';
        }

        async function declencherSOS() {
            if (confirm("🚨 SIGNALER UN DANGER ?")) {
                const pos = markerMe.getLatLng();
                await fetch('/alerte-sos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ lat: pos.lat, lon: pos.lng }) });
                alert("Sécurité prévenue.");
            }
        }

    </script>
</body>
</html>
