<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Suivi de votre prestataire - PetitsDjobs</title>
</head>
<body class="tracking-body">
    <div class="loader-gps" id="main-loader"></div>
    <div id="map"></div>

    <div class="floating-top-info" style="background: white; border: 1px solid #eee;">
        <h2 id="status-mission" style="font-size: 1.1rem; margin: 0; color: #5D4037;">ÉCRAN DE SUIVI CLIENT</h2>
        <p id="mission-info" style="color:#666; font-size: 0.75rem; margin: 3px 0 0; font-weight: bold;">Attente du signal...</p>
        
        <div class="nav-actions-top">
            <button onclick="location.href='/chat.html?missionId='+missionId" class="btn-primary-sm btn-nav" style="background:#8B4513;">💬 CHAT</button>
            <button id="btn-client-arrive" onclick="clientMarquerArrivee()" class="btn-primary-sm btn-nav" style="display:none; background:#2e7d32;">IL EST ARRIVÉ</button>
            <button id="btn-client-fin" onclick="clientDemandeFin()" class="btn-primary-sm btn-nav" style="display:none;">TÂCHE FINIE</button>
            <button id="btn-client-depart" onclick="document.getElementById('modal-notation').style.display='flex'" class="btn-primary-sm btn-nav" style="display:none; background:#333;">VALIDER DÉPART</button>
            <button id="btn-client-sos" onclick="declencherSOS()" class="btn-danger btn-nav" style="display:none;">🆘 SOS</button>
        </div>
    </div>

    <div class="floating-bottom-actions">
        <div id="gps-info" style="font-weight: 800; margin-bottom: 15px; color: #ff5252; font-size: 1.1rem;">Recherche du prestataire...</div>
    </div>

    <!-- Modal de notation -->
    <div id="modal-notation" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; padding:20px; box-sizing:border-box;">
        <div class="login-card" style="max-width:400px; text-align:center;">
            <h2 style="color:#5D4037; margin-top:0;">MISSION TERMINÉE !</h2>
            <p style="font-size:0.9rem; color:#666;">Notez la prestation (10 petites étoiles = 1 grande étoile)</p>
            
            <div id="star-rating" style="display:flex; justify-content:center; gap:4px; margin:20px 0; font-size:1.8rem; cursor:pointer; color:#ccc;">
                <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                <span data-v="6">★</span><span data-v="7">★</span><span data-v="8">★</span><span data-v="9">★</span><span data-v="10">★</span>
            </div>
            
            <textarea id="note-commentaire" placeholder="Un petit commentaire sur le travail ?" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px; box-sizing:border-box; min-height:80px;"></textarea>
            
            <button onclick="envoyerNote()" class="btn-primary-sm" style="width:100%; padding:15px;">ENVOYER MA NOTE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        let map, markerMe, markerProvider, missionId, prestataireId, routingControl;
        let lastDist = null;
        let noteSelectionnee = 0;
        let hasCentered = false;

        const iconMe = L.divIcon({ className: 'custom-icon', html: '<div style="background:#ff5252; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(255,82,82,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
        const iconPro = L.divIcon({ className: 'custom-icon', html: '<div style="background:#007bff; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,123,255,0.5);"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });

        function logDebug(msg) {
            console.log("[DEBUG CLIENT] " + msg);
            document.getElementById('mission-info').innerText = msg;
        }

        // Gestion visuelle des étoiles
        document.getElementById('star-rating').addEventListener('click', e => {
            if (e.target.dataset.v) {
                noteSelectionnee = parseInt(e.target.dataset.v);
                const stars = document.querySelectorAll('#star-rating span');
                stars.forEach((s, idx) => {
                    if (idx < noteSelectionnee) {
                        s.style.color = "#5D4037"; // Marron PetitsDjobs
                    } else {
                        s.style.color = "#ccc";
                    }
                });
            }
        });

        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });

        function init() {
            map = L.map('map', { zoomControl: false, dragging: true }).setView([0, 0], 18);
            
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);
            
            markerMe = L.marker([0, 0], { icon: iconMe }).addTo(map);
            markerProvider = L.marker([0, 0], { icon: iconPro }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [],
                lineOptions: { 
                    styles: [
                        { color: 'white', opacity: 0.6, weight: 12 },
                        { color: '#007bff', opacity: 1, weight: 7, dashArray: '10, 15' } // Guidage en pointillés bleus
                    ] 
                },
                createMarker: () => null,
                addWaypoints: false,
                show: false,
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1/foot' }),
                routeWhileDragging: true // Permet de recalculer la route si les marqueurs sont déplacés (utile pour le debug)
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                const distM = summary.totalDistance; // Distance réelle à pied
                const label = distM < 1000 ? Math.round(distM) + " m" : (distM/1000).toFixed(1) + " km";
                document.getElementById('gps-info').innerHTML = `🛵 Prestataire en approche : <strong>${label}</strong>`;
                verifierProximite(distM);
            });

            fetch('/get-session-commande').then(r => r.json()).then(cmd => {
                if (!cmd.missionId) {
                    logDebug("Mission ID introuvable.");
                    return;
                }
                missionId = cmd.missionId;
                prestataireId = cmd.prestataireId;
                logDebug("Suivi mission " + missionId + " prêt.");
                setInterval(pollProvider, 2000);
                setInterval(checkStatus, 2000);
                startGPS(); // Lancer le GPS après avoir initialisé missionId
            }).catch(e => logDebug("Erreur session: " + e.message));
        }

        let isProcessingArrivee = false;

        function startGPS() {
            const gpsOptions = {
                enableHighAccuracy: false,
                maximumAge: 5000,
                timeout: 10000
            };

            navigator.geolocation.watchPosition(pos => {
                document.getElementById('main-loader').style.display = 'none';
                
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                logDebug(`GPS Client OK (±${Math.round(accuracy)}m)`);

                markerMe.setLatLng([lat, lon]);
                
                if (!hasCentered) {
                    map.setView([lat, lon], 18);
                    hasCentered = true;
                }
                
                fetch('/sauvegarder-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon })
                });
            }, (err) => logDebug("Erreur GPS: " + err.message), gpsOptions);
        }

        function pollProvider() {
            fetch('/api/suivi-prestataire-gps?missionId=' + missionId).then(r => r.json()).then(async pos => {
                if (pos.lat) {
                    logDebug("Position prestataire reçue.");
                    const pPos = L.latLng(pos.lat, pos.lon);
                    markerProvider.setLatLng(pPos);
                    
                    const myPos = markerMe.getLatLng();
                    if (myPos.lat !== 0 && myPos.lng !== 0 && pPos.lat !== 0 && pPos.lng !== 0) {
                        routingControl.setWaypoints([L.latLng(pPos.lat, pPos.lon), L.latLng(myPos.lat, myPos.lon)]);
                        if (!map.getBounds().contains(pPos)) map.panTo(pPos);
                    } else {
                        logDebug("En attente de votre position pour l'itinéraire...");
                    }
                }
            });
        }

        async function verifierProximite(dist) {
            // ACTIVATION AUTOMATIQUE si distance < 50m (à pied)
            if (dist < 50 && !isProcessingArrivee) {
                const resStat = await fetch('/api/statut-mission?missionId=' + missionId);
                const dataStat = await resStat.json();
                if (dataStat.statut === 'en_route') clientMarquerArrivee();
            }
            lastDist = dist;
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/statut-mission?missionId=' + missionId);
                if (!res.ok) return;
                const data = await res.json();
                if (!data || !data.statut) return;
                
                const btnArrive = document.getElementById('btn-client-arrive');
                const btnFin = document.getElementById('btn-client-fin');
                const btnSos = document.getElementById('btn-client-sos');
                const btnDepart = document.getElementById('btn-client-depart');
                const statusTxt = document.getElementById('status-mission');
                const gpsInfo = document.getElementById('gps-info');

                // Si le client vient de cliquer sur "Arrivée", on ne réaffiche pas le bouton pendant 2 sec
                if (isProcessingArrivee && data.statut === 'en_route') return;

                // Gestion propre de l'affichage : on définit l'état de chaque bouton pour chaque statut
                switch(data.statut) {
                    case 'en_route':
                        btnArrive.style.display = 'block';
                        btnFin.style.display = 'none';
                        btnDepart.style.display = 'none';
                        statusTxt.innerText = "Le prestataire arrive...";
                        break;
                    case 'travail_en_cours':
                        btnArrive.style.display = 'none';
                        btnFin.style.display = 'block';
                        btnSos.style.display = 'block';
                        btnDepart.style.display = 'none';
                        statusTxt.innerText = "Intervention en cours";
                        break;
                    case 'attente_securite':
                        btnArrive.style.display = 'none';
                        btnSos.style.display = 'none';
                        btnDepart.style.display = 'block';
                        statusTxt.innerText = "Tâche terminée - Départ en attente";
                        break;
                    case 'termine':
                        alert("Mission terminée avec succès !");
                        window.location.href = '/index.html';
                        break;
                    default:
                        // Par sécurité, on cache tout si le statut est inconnu
                        btnArrive.style.display = 'none';
                        btnSos.style.display = 'none';
                        btnDepart.style.display = 'none';
                        break;
                }
            } catch (err) {
                console.error("Erreur polling statut:", err);
            }
        }

        async function clientMarquerArrivee() {
            const btn = document.getElementById('btn-client-arrive');
            btn.disabled = true;
            btn.innerText = "CHARGEMENT...";
            
            const res = await fetch('/api/marquer-arrivee', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });

            if (res.ok) {
                btn.style.display = 'none';
                isProcessingArrivee = true;
                setTimeout(() => { isProcessingArrivee = false; checkStatus(); }, 2500);
            } else {
                btn.disabled = false;
                btn.innerText = "L'INTERVENANT EST ARRIVÉ";
            }
        }

        async function clientDemandeFin() {
            if (confirm("Confirmez-vous la fin de la tâche ?")) {
                await fetch('/api/terminer-tache-client', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ missionId }) 
                });
            }
        }

        async function clientConfirmerDepart() {
            const btn = document.getElementById('btn-client-depart');
            btn.disabled = true;
            
            await fetch('/api/confirmer-depart', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
        }

        async function envoyerNote() {
            if (noteSelectionnee === 0) return alert("Veuillez sélectionner une note.");
            const commentaire = document.getElementById('note-commentaire').value;
            
            await fetch('/api/noter-prestataire', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ missionId, prestataireId, note: noteSelectionnee, commentaire })
            });
            window.location.href = '/index.html';
        }

        async function declencherSOS() {
            if (confirm("🚨 SIGNALER UN DANGER ?")) {
                const pos = markerMe.getLatLng();
                await fetch('/alerte-sos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ lat: pos.lat, lon: pos.lng }) });
                alert("Sécurité prévenue.");
            }
        }

        init();
    </script>
</body>
</html>
