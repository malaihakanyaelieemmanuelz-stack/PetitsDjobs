<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Discuter le prix - PETITSDJOBS</title>
</head>
<body class="auth-page">
    <div class="login-card" style="max-width: 420px;">
        <h1>NÉGOCIER UN PRIX</h1>
        <p style="font-size:0.9rem; color:#666;">Proposez un montant. Le cerveau l'envoie aux prestataires les plus proches (GPS). S'il n'y a pas d'acceptation, augmentez votre offre.</p>
        <input type="number" id="prix-propose" placeholder="Votre prix en FCFA" min="100" required style="width:100%; padding:12px; margin:10px 0;">
        <p id="statut" style="font-size:0.85rem;"></p>
        <button id="btn-envoyer" style="width:100%; padding:14px; background:#5D4037; color:white; border:none; border-radius:8px; cursor:pointer;">
            ENVOYER AUX PRESTATAIRES PROCHES
        </button>
        <button id="btn-augmenter" style="display:none; width:100%; padding:12px; margin-top:10px; background:#007bff; color:white; border:none; border-radius:8px;">
            AUGMENTER L'OFFRE
        </button>
        <button id="btn-commander" style="display:none; width:100%; padding:12px; margin-top:10px; background:green; color:white; border:none; border-radius:8px;">
            COMMANDER À CE PRIX
        </button>
        <p style="margin-top:16px; text-align:center;"><a href="/">Retour accueil</a></p>
    </div>
    <script>
        let offreId = null;
        let pollTimer = null;

        document.getElementById('btn-envoyer').onclick = () => {
            const prix = document.getElementById('prix-propose').value;
            if (!prix) return alert('Indiquez un prix.');
            if (!navigator.geolocation) return alert('GPS requis.');

            navigator.geolocation.getCurrentPosition(async pos => {
                const res = await fetch('/proposer-prix-discuter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prix,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    })
                });
                const data = await res.json();
                document.getElementById('statut').innerText = data.message || '';
                if (data.offreId) {
                    offreId = data.offreId;
                    document.getElementById('btn-augmenter').style.display = 'block';
                    pollTimer = setInterval(verifierOffre, 3000);
                }
            }, () => alert('Autorisez la localisation.'));
        };

        document.getElementById('btn-augmenter').onclick = () => {
            const input = document.getElementById('prix-propose');
            input.value = (parseInt(input.value, 10) || 0) + 500;
            document.getElementById('btn-envoyer').click();
        };

        document.getElementById('btn-commander').onclick = () => {
            window.location.href = '/commande?service=Service%20particulier&prix=' + document.getElementById('prix-propose').value;
        };

        async function verifierOffre() {
            if (!offreId) return;
            const res = await fetch('/statut-offre/' + offreId);
            const data = await res.json();
            if (data.statut === 'accepte') {
                clearInterval(pollTimer);
                document.getElementById('statut').innerText = 'Un prestataire a accepté ' + data.prix + ' FCFA !';
                document.getElementById('btn-commander').style.display = 'block';
            } else if (data.suggestion) {
                document.getElementById('statut').innerText = data.suggestion;
            }
        }
    </script>
</body>
</html>
