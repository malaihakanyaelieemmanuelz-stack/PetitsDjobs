<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Discuter le prix - PETITSDJOBS</title>
</head>
<body class="auth-page">
    <div class="login-card" style="max-width: 480px;">
        <h1 id="page-title">NÉGOCIER UN PRIX</h1>
        <p style="font-size:0.9rem; color:#2e7d32;">Décrivez le travail et fixez votre prix. Les prestataires proches verront votre offre.</p>
        
        <div id="details-recap" style="display:none; background:#e8f5e9; padding:15px; border-radius:10px; margin-bottom:15px; text-align:left; border:1px solid #2e7d32;">
            <p style="margin:0 0 5px 0;"><strong>📝 Service :</strong> <span id="recap-desc"></span></p>
            <p style="margin:0;"><strong>💰 Prix proposé :</strong> <span id="recap-prix"></span> FCFA</p>
        </div>

        <textarea id="description-job" placeholder="Description brève du travail (ex: Nettoyer une cour de 20m2)" required class="pd-field"></textarea>
        <input type="number" id="prix-propose" placeholder="Prix proposé en FCFA" min="100" required class="pd-field">

        <div id="date-selection-block" style="margin-bottom: 20px; text-align: left;">
            <label class="pd-label">QUAND ?</label>
            <select id="select-date-mode" onchange="toggleDatePicker()" class="pd-field">
                <option value="today">Aujourd'hui (Maintenant)</option>
                <option value="scheduled">Programmer une date ultérieure</option>
            </select>
            <div id="scheduled-fields" style="display:none; flex-direction: column; gap: 10px; margin-top: 10px;">
                <div>
                    <label for="input-date-custom" class="pd-sublabel">📅 CHOISIR LA DATE :</label>
                    <input type="date" id="input-date-custom" class="pd-field">
                </div>
                <div>
                    <label for="input-time-custom" class="pd-sublabel">🕐 CHOISIR L'HEURE :</label>
                    <input type="time" id="input-time-custom" class="pd-field">
                </div>
            </div>
        </div>
        
        <p id="label-photo" class="pd-sublabel" style="margin:0;">Photo du travail (optionnel) :</p>
        <input type="file" id="photo-job" accept="image/*" class="pd-field" style="padding:8px;">

        <p id="statut" style="font-size:0.85rem; color:#2e7d32;"></p>
        <div id="liste-volontaires" style="margin-top:15px; display:none;">
            <p style="font-weight:bold; color:#2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 5px;">PRESTATAIRES INTÉRESSÉS :</p>
            <div id="container-volontaires"></div>
        </div>
        <button id="btn-envoyer" class="btn-primary-sm" style="width:100%; padding:15px; margin-top:10px; font-size:1.1rem; text-transform:uppercase;">
            ENVOYER AUX PRESTATAIRES PROCHES
        </button>
        <button id="btn-augmenter" style="display:none; width:100%; padding:12px; margin-top:10px; background:#2e7d32; color:white; border:none; border-radius:8px;">
            AUGMENTER L'OFFRE
        </button>
        <button id="btn-annuler" style="display:none; width:100%; padding:12px; margin-top:10px; background:#FF6600; color:white; border:none; border-radius:8px; cursor:pointer;">
            ANNULER MA TÂCHE
        </button>
        <p style="margin-top:16px; text-align:center;"><a href="/" style="color:#FF6600;">Retour accueil</a></p>
    </div>
    <script>
        let offreId = null;
        let pollTimer = null;
        let startTime = null;
        let userLat = null;
        let userLon = null;

        // Démarrer la recherche GPS dès le chargement pour éviter l'attente au clic
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
            }, null, { enableHighAccuracy: true });
        }

        function toggleDatePicker() {
            const mode = document.getElementById('select-date-mode').value;
            document.getElementById('scheduled-fields').style.display = (mode === 'scheduled') ? 'flex' : 'none';
        }

        document.getElementById('btn-envoyer').onclick = () => {
            const prix = document.getElementById('prix-propose').value;
            const desc = document.getElementById('description-job').value;
            const photoInput = document.getElementById('photo-job');
            const btnEnvoyer = document.getElementById('btn-envoyer');

            if (!prix) return alert('Indiquez un prix.');
            if (!desc) return alert('Précisez la nature du service.');

            const dateMode = document.getElementById('select-date-mode').value;
            let dateVal = 'today';
            if (dateMode === 'scheduled') {
                const d = document.getElementById('input-date-custom').value;
                const t = document.getElementById('input-time-custom').value;
                if (!d || !t) return alert("Veuillez choisir une date et une heure.");
                dateVal = `${d} à ${t}`;
            }

            async function executerEnvoi(lat, lon) {
                btnEnvoyer.innerText = "ENVOI EN COURS...";
                btnEnvoyer.disabled = true;
                try {
                    const formData = new FormData();
                    formData.append('prix', prix);
                    formData.append('description', desc);
                    formData.append('lat', lat);
                    formData.append('lon', lon);
                    formData.append('datePrevue', dateVal);
                    if (photoInput.files[0]) formData.append('photo_job', photoInput.files[0]);

                    const res = await fetch('/proposer-prix-discuter', { method: 'POST', body: formData });
                    if (!res.ok) throw new Error("Erreur serveur (" + res.status + ")");
                    const data = await res.json();
                    
                    if (data.offreId) {
                        offreId = data.offreId;
                        // Transition immédiate
                        const recapData = { description: desc, prix: prix };
                        activerModeGestion(recapData);
                        marquerOffreVue(offreId);
                        verifierOffre(); // Premier check immédiat
                        pollTimer = setInterval(verifierOffre, 1500);
                    }
                } catch (err) {
                    alert("Erreur lors de l'envoi de l'offre.");
                    btnEnvoyer.innerText = "ENVOYER AUX PRESTATAIRES PROCHES";
                    btnEnvoyer.disabled = false;
                }
            }

            if (userLat && userLon) {
                // Exécution instantanée car on a déjà la position en mémoire
                executerEnvoi(userLat, userLon);
            } else if (navigator.geolocation) {
                btnEnvoyer.innerText = "RECHERCHE GPS...";
                navigator.geolocation.getCurrentPosition(
                    pos => executerEnvoi(pos.coords.latitude, pos.coords.longitude),
                    () => { alert('Autorisez la localisation.'); btnEnvoyer.innerText = "ENVOYER AUX PRESTATAIRES PROCHES"; }
                );
            } else {
                alert('GPS non supporté.');
            }
        };

        async function marquerOffreVue(id) {
            if (!id) return;
            await fetch(`/api/marquer-offre-vue/${id}`, { method: 'POST' });
        }

        function activerModeGestion(data) {
            document.getElementById('page-title').innerText = "GESTION DE MON OFFRE";
            
            // Masquer le formulaire de création
            document.getElementById('description-job').style.display = 'none';
            document.getElementById('prix-propose').style.display = 'none';
            document.getElementById('date-selection-block').style.display = 'none';
            document.getElementById('label-photo').style.display = 'none';
            document.getElementById('photo-job').style.display = 'none';
            
            // Afficher le récapitulatif
            if (data) {
                document.getElementById('details-recap').style.display = 'block';
                document.getElementById('recap-desc').innerText = data.description;
                document.getElementById('recap-prix').innerText = data.prix;
            }

            document.getElementById('btn-envoyer').style.display = 'none';
            document.getElementById('btn-augmenter').style.display = 'block';
            document.getElementById('btn-annuler').style.display = 'block';
        }

        document.getElementById('btn-annuler').onclick = async () => {
            if (!confirm("Voulez-vous vraiment annuler cette tâche ?")) return;
            const res = await fetch('/annuler-job/' + offreId, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                alert(data.message || "Tâche annulée.");
                window.location.href = '/';
            } else {
                alert(data.error || "Erreur lors de l'annulation");
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const urlOffreId = urlParams.get('offreId');
        if (urlOffreId) {
            offreId = parseInt(urlOffreId, 10);
            fetch('/get-job-details/' + offreId).then(r => r.json()).then(data => {
                if (data.id) {
                    document.getElementById('description-job').value = data.description;
                    document.getElementById('prix-propose').value = data.prix;
                    activerModeGestion(data);
                    marquerOffreVue(offreId);
                    verifierOffre(); // Appel immédiat au chargement
                    pollTimer = setInterval(verifierOffre, 1500);
                }
            });
        }

        document.getElementById('btn-augmenter').onclick = async () => {
            const augmentation = prompt("De combien voulez-vous augmenter votre offre ? (ex: 500)", "500");
            if (!augmentation) return;
            const montant = parseInt(augmentation, 10);
            if (isNaN(montant) || montant <= 0) return alert("Veuillez saisir un montant valide.");

            const currentPrix = parseInt(document.getElementById('recap-prix').innerText, 10) || 0;
            const nouveauPrix = currentPrix + montant;

            const res = await fetch(`/api/modifier-prix-offre/${offreId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nouveauPrix })
            });
            if (res.ok) {
                document.getElementById('recap-prix').innerText = nouveauPrix;
                document.getElementById('statut').innerText = "Prix augmenté ! En attente de nouveaux prestataires...";
                verifierOffre(); // Rafraîchir immédiatement après l'augmentation
            }
        };

        async function verifierOffre() {
            if (!offreId) return;
            try {
                const res = await fetch('/statut-offre/' + offreId);
                if (!res.ok) throw new Error("Échec polling");
                const data = await res.json();
                if (data.statut === 'accepte') {
                    document.getElementById('btn-annuler').style.display = 'block';
                    document.getElementById('liste-volontaires').style.display = 'block';
                    document.getElementById('container-volontaires').innerHTML = data.list.map(p => `
                        <div style="display:flex; align-items:center; gap:10px; padding:10px; background:#e8f5e9; border-radius:8px; margin-bottom:8px; border:2px solid #2e7d32;">
                            <img src="${p.photo || 'default-profile.png'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                            <div style="flex:1; text-align:left;">
                                <div style="font-size:0.85rem; font-weight:bold; color:#2e7d32;">${p.prenom} ${p.nom}</div>
                                <div style="font-size:0.75rem; color:#FF6600;">⭐ ${p.etoiles}/5 · ${p.profession}</div>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button onclick="location.href='/voir-prestataire?id=${p.id}'" style="padding:4px 8px; background:#2e7d32; color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.7rem;">VOIR</button>
                                <button onclick="finaliserChoix(${p.id}, ${data.prix})" style="padding:6px 12px; background:#FF6600; color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.8rem; font-weight:bold;">ACCEPTER</button>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('statut').innerText = data.list.length + ' prestataire(s) ont accepté votre prix !';
                    
                    // Puisqu'on voit la liste ici, on informe le serveur pour effacer la notif sur l'accueil
                    marquerOffreVue(offreId);
                } else if (data.suggestion) {
                    document.getElementById('statut').innerText = data.suggestion;
                }
            } catch (err) { console.error(err); }
        }

        async function finaliserChoix(prestataireId, prix) {
            await fetch('/preparer-commande', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ service: 'Service particulier', prix, prixLibre: true, offreParticulierId: offreId })
            });
            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prestataireId, serviceChoisi: 'Service particulier' })
            });
            if (res.ok) window.location.href = '/commande?service=Service%20particulier&prix=' + prix;
        }
    </script>
</body>
</html>
