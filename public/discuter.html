<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Discuter le prix - PETITSDJOBS</title>
</head>
<body class="auth-page">
    <div class="login-card" style="max-width: 480px;">
        <h1>NÉGOCIER UN PRIX</h1>
        <p style="font-size:0.9rem; color:#666;">Décrivez le travail et fixez votre prix. Les prestataires proches verront votre offre.</p>
        
        <textarea id="description-job" placeholder="Description brève du travail (ex: Nettoyer une cour de 20m2)" required style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd; min-height:80px;"></textarea>
        <input type="number" id="prix-propose" placeholder="Prix proposé en FCFA" min="100" required style="width:100%; padding:12px; margin:10px 0;">

        <div style="margin-bottom: 20px; text-align: left;">
            <label style="font-weight: bold; color: #FF6600; display: block; margin-bottom: 8px; font-size: 0.9rem;">QUAND ?</label>
            <select id="select-date-mode" onchange="toggleDatePicker()" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white;">
                <option value="today">Aujourd'hui (Maintenant)</option>
                <option value="scheduled">Programmer une date ultérieure</option>
            </select>
            <div id="scheduled-fields" style="display:none; flex-direction: column; gap: 10px; margin-top: 10px;">
                <input type="date" id="input-date-custom" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                <input type="time" id="input-time-custom" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>
        </div>
        
        <p style="text-align:left; font-size:0.8rem; margin:0;">Photo du travail (optionnel) :</p>
        <input type="file" id="photo-job" accept="image/*" style="width:100%; margin:8px 0;">

        <p id="statut" style="font-size:0.85rem;"></p>
        <div id="liste-volontaires" style="margin-top:15px; display:none;">
            <p style="font-weight:bold; color:#2e7d32;">Prestataires intéressés :</p>
            <div id="container-volontaires"></div>
        </div>
        <button id="btn-envoyer" style="width:100%; padding:15px; background-color: #FF6600; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight: bold; font-size: 1.1rem; text-transform: uppercase;">
            ENVOYER AUX PRESTATAIRES PROCHES
        </button>
        <button id="btn-augmenter" style="display:none; width:100%; padding:12px; margin-top:10px; background:#2e7d32; color:white; border:none; border-radius:8px;">
            AUGMENTER L'OFFRE
        </button>
        <button id="btn-annuler" style="display:none; width:100%; padding:12px; margin-top:10px; background:#FF6600; color:white; border:none; border-radius:8px; cursor:pointer;">
            ANNULER MA TÂCHE
        </button>
        <p style="margin-top:16px; text-align:center;"><a href="/">Retour accueil</a></p>
    </div>
    <script>
        let offreId = null;
        let pollTimer = null;
        let startTime = null;

        function toggleDatePicker() {
            const mode = document.getElementById('select-date-mode').value;
            document.getElementById('scheduled-fields').style.display = (mode === 'scheduled') ? 'flex' : 'none';
        }

        document.getElementById('btn-envoyer').onclick = () => {
            const prix = document.getElementById('prix-propose').value;
            const desc = document.getElementById('description-job').value;
            const photoInput = document.getElementById('photo-job');

            if (!prix) return alert('Indiquez un prix.');
            if (!desc) return alert('Précisez la nature du service.');
            if (!navigator.geolocation) return alert('GPS requis.');

            const dateMode = document.getElementById('select-date-mode').value;
            let dateVal = 'today';
            if (dateMode === 'scheduled') {
                const d = document.getElementById('input-date-custom').value;
                const t = document.getElementById('input-time-custom').value;
                if (!d || !t) return alert("Veuillez choisir une date et une heure.");
                dateVal = `${d} à ${t}`;
            }

            navigator.geolocation.getCurrentPosition(async pos => {
                try {
                    const formData = new FormData();
                    formData.append('prix', prix);
                    formData.append('description', desc);
                    formData.append('lat', pos.coords.latitude);
                    formData.append('lon', pos.coords.longitude);
                    formData.append('datePrevue', dateVal);
                    if (photoInput.files[0]) formData.append('photo_job', photoInput.files[0]);

                    const res = await fetch('/proposer-prix-discuter', {
                        method: 'POST',
                        body: formData
                    });
                    if (!res.ok) throw new Error("Erreur serveur (" + res.status + ")");
                    const data = await res.json();
                    document.getElementById('statut').innerText = data.message || '';
                    if (data.offreId) {
                        offreId = data.offreId;
                        startTime = Date.now();
                        activerModeGestion();
                        pollTimer = setInterval(verifierOffre, 3000);
                    }
                } catch (err) {
                    console.error("❌ [ENVOI] Échec de la publication de l'offre :", err.message);
                    alert("❌ Erreur lors de l'envoi de l'offre.");
                }
            }, (err) => {
                console.error("❌ [GPS] Accès refusé ou erreur :", err.message);
                alert('❌ Autorisez la localisation.');
            });
        };

        function activerModeGestion() {
            document.getElementById('btn-envoyer').style.display = 'none';
            document.getElementById('btn-augmenter').style.display = 'block';
            document.getElementById('btn-annuler').style.display = 'block';
        }

        document.getElementById('btn-annuler').onclick = async () => {
            if (!confirm("Voulez-vous vraiment annuler cette tâche ?")) return;
            const res = await fetch('/annuler-job/' + offreId, { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                alert("Tâche annulée avec succès.");
                window.location.href = '/';
            } else {
                alert(data.error || "Erreur lors de l'annulation");
            }
        };

        // Charger une offre existante si l'ID est dans l'URL (mode "Gérer ma tâche")
        const urlParams = new URLSearchParams(window.location.search);
        const urlOffreId = urlParams.get('offreId');
        if (urlOffreId) {
            offreId = parseInt(urlOffreId, 10);
            fetch('/get-job-details/' + offreId).then(r => r.json()).then(data => {
                if (data.id) {
                    document.getElementById('description-job').value = data.description;
                    document.getElementById('prix-propose').value = data.prix;
                    activerModeGestion();
                    pollTimer = setInterval(verifierOffre, 3000);
                }
            });
        }

        document.getElementById('btn-augmenter').onclick = () => {
            const input = document.getElementById('prix-propose');
            input.value = (parseInt(input.value, 10) || 0) + 500;
            document.getElementById('btn-envoyer').click();
        };

        async function verifierOffre() {
            if (!offreId) return;
            try {
                // Vérification du délai de 2 minutes
                if (startTime && (Date.now() - startTime > 120000)) {
                    const statusEl = document.getElementById('statut');
                    if (!statusEl.innerHTML.includes('red')) {
                        statusEl.innerHTML += '<br><span style="color:red; font-weight:bold;">⚠️ Cela fait 2 min. Toujours pas d\'acceptation ? Augmentez le prix pour attirer les prestataires !</span>';
                    }
                }

                const res = await fetch('/statut-offre/' + offreId);
                if (!res.ok) throw new Error("Échec polling (" + res.status + ")");
                const data = await res.json();
                if (data.statut === 'accepte') {
                    document.getElementById('btn-annuler').style.display = 'none';
                    document.getElementById('liste-volontaires').style.display = 'block';
                    const container = document.getElementById('container-volontaires');
                    container.innerHTML = data.list.map(p => `
                        <div style="display:flex; align-items:center; gap:10px; padding:10px; background:#f0f7f0; border-radius:8px; margin-bottom:8px; border:1px solid #c8e6c9;">
                            <img src="${p.photo || 'default-profile.png'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                            <div style="flex:1; text-align:left;">
                                <div style="font-size:0.85rem; font-weight:bold;">${p.prenom} ${p.nom}</div>
                                <div style="font-size:0.75rem;">⭐ ${p.etoiles}/5 · ${p.profession}</div>
                            </div>
                            <button onclick="finaliserChoix(${p.id}, ${data.prix})" style="padding:6px 12px; background:#2e7d32; color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.8rem;">CHOISIR</button>
                        </div>
                    `).join('');
                    document.getElementById('statut').innerText = data.list.length + ' prestataire(s) ont accepté votre prix !';
                } else if (data.suggestion) {
                    document.getElementById('statut').innerText = data.suggestion;
                }
            } catch (err) {
                console.error("❌ [VERIFICATION] Erreur lors de la vérification du statut :", err.message);
            }
        }

        async function finaliserChoix(prestataireId, prix) {
            try {
                const res = await fetch('/selectionner-prestataire', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prestataireId })
                });
                if (!res.ok) throw new Error("Échec sélection (" + res.status + ")");
                window.location.href = '/commande?service=Service%20particulier&prix=' + prix;
            } catch (err) {
                console.error("❌ [CHOIX] Échec de la sélection finale :", err.message);
                alert("❌ Erreur lors de la sélection du prestataire.");
            }
        }
    </script>
</body>
</html>
