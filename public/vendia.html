<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vendia - Supermarché Vortex</title>
</head>
<body class="vendia-page">
    <!-- Filigrane blanc sur fond vert -->
    <div id="bg-logo-fixed" class="vendia-bg"></div>

    <header class="home-header">
        <div class="header-content">
            <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; color: white;">
                    <img src="logo-vendia.jpeg" class="home-logo" alt="Logo Vendia">
                    VENDIA
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="/">VORTEX</a>
            </nav>
        </div>
    </header>

    <main class="app-wrap">
        <div style="text-align: center; color: white; margin-top: 50px;">
            <h2 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;">VOTRE MARCHÉ LOCAL</h2>
            <p style="font-weight: bold; opacity: 0.9;">Les meilleurs prix, livrés au plus vite.</p>
        </div>

        <!-- Zone pour les futurs produits -->
        <div id="promotions-container" style="margin-top: 40px;">
            <h3 style="color: #FF6600; background: white; display: inline-block; padding: 5px 15px; border-radius: 10px;">🔥 PROMOTIONS DU MOMENT</h3>
            <div class="service-grid" id="vendia-grid">
                <!-- Les produits seront injectés ici par JS -->
                <p style="color: white; grid-column: 1/-1; text-align: center;">Recherche des meilleures offres à proximité...</p>
            </div>
        </div>
    </main>
</body>
</html>
