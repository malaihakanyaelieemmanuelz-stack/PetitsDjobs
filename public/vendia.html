<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vendia - Supermarché Vortex</title>
</head>
<body class="vendia-page">
    <!-- Filigrane blanc sur fond vert -->
    <div id="bg-logo-fixed" class="vendia-bg"></div>

    <header class="home-header">
        <div class="header-content">
            <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; color: var(--pd-green);">
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <path fill="#2e7d32" d="M83 45.2c-.1-.9-.3-1.8-.5-2.7l11.4-5.3-6-10.4-11.9 6.7c-1.3-1.6-2.8-3.1-4.4-4.3l5.4-11.4-10.4-6-6.1 11c-1.8-.4-3.6-.7-5.4-.8V10h-12v11.7c-1.8.1-3.6.3-5.4.8L32.6 11.1l-10.4 6 5.4 11.4c-1.6 1.3-3.1 2.8-4.4 4.4L11.8 27.7l-6 10.4 11.1 6.1c-.4 1.8-.7 3.6-.8 5.4H5.9v12h11.7c.1 1.8.3 3.6.8 5.4l-11.1 6.1 6 10.4 11.4-5.4c1.3 1.6 2.8 3.1 4.4 4.3l-5.3 11.4 10.4 6 6.1-11c1.8.4 3.6.7 5.4.8V90.1h12V78.4c1.8-.1 3.6-.3 5.4-.8l6.1 11 10.4-6-5.4-11.4c1.6-1.3 3.1-2.8 4.4-4.4l11.5 5.3 6-10.4-11.1-6.1c.4-1.8.7-3.6.8-5.4H90.1v-12H83z"/>
                        <circle cx="50" cy="50" r="15" fill="white"/>
                    </svg>
                    VENDIA
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="/">VORTEX</a>
            </nav>
        </div>
    </header>

    <main class="app-wrap">
        <div style="text-align: center; color: white; margin-top: 50px;">
            <h2 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;">VOTRE MARCHÉ LOCAL</h2>
            <p style="font-weight: bold; opacity: 0.9;">Les meilleurs prix, livrés au plus vite.</p>
        </div>

        <!-- Zone pour les futurs produits -->
        <div id="promotions-container" style="margin-top: 40px;">
            <h3 style="color: #FF6600; background: white; display: inline-block; padding: 5px 15px; border-radius: 10px;">🔥 PROMOTIONS DU MOMENT</h3>
            <div class="service-grid" id="vendia-grid">
                <!-- Les produits seront injectés ici par JS -->
                <p style="color: white; grid-column: 1/-1; text-align: center;">Recherche des meilleures offres à proximité...</p>
            </div>
        </div>
    </main>
</body>
</html>
