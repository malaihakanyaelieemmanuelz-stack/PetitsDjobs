<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Chat Mission - PetitsDjobs</title>
</head>
<body style="background:#f4f4f4; height: 100dvh; display: flex; flex-direction: column; margin:0;">
    <header class="home-header">
        <div class="header-content">
            <button onclick="history.back()" style="background:none; border:none; color:#5D4037; font-weight:bold; cursor:pointer; font-size:1.2rem;">←</button>
            <h1 style="font-size: 1.1rem; color: #5D4037;">CHAT DE MISSION</h1>
        </div>
    </header>

    <div id="chat-box" style="flex:1; overflow-y:auto; padding: 20px; display:flex; flex-direction:column; gap:12px;">
        <p style="text-align:center; color:#888; font-size:0.8rem;">Les messages sont sécurisés.</p>
    </div>

    <div style="padding:15px; background:white; border-top:1px solid #eee; display:flex; gap:10px; align-items:center;">
        <input type="text" id="chat-input" placeholder="Écrire un message..." style="flex:1; padding:15px; border-radius:30px; border:1px solid #ddd; outline:none; font-size:1rem;">
        <button id="btn-send" style="background:#5D4037; color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➔</button>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const missionId = params.get('missionId');
        let userId = null;
        let lastCount = 0;

        fetch('/get-user-data').then(r => r.json()).then(u => {
            userId = u.id;
            loadMessages();
            setInterval(loadMessages, 3000);
        });

        async function loadMessages() {
            if (!missionId) return;
            const res = await fetch(`/api/get-messages/${missionId}`);
            const messages = await res.json();
            const box = document.getElementById('chat-box');
            
            if (messages.length !== lastCount) {
                box.innerHTML = messages.map(m => {
                    const isMe = String(m.sender_id) === String(userId);
                    return `
                        <div style="align-self: ${isMe ? 'flex-end' : 'flex-start'}; 
                                    background: ${isMe ? '#5D4037' : 'white'}; 
                                    color: ${isMe ? 'white' : '#333'}; 
                                    padding: 12px 18px; 
                                    border-radius: ${isMe ? '20px 20px 0 20px' : '20px 20px 20px 0'}; 
                                    max-width: 85%; 
                                    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
                                    font-size: 0.95rem; line-height:1.4;">
                            ${m.text}
                        </div>
                    `;
                }).join('');
                box.scrollTop = box.scrollHeight;
                lastCount = messages.length;
            }
        }

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            await fetch('/api/send-message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ missionId, text })
            });
            loadMessages();
        };
    </script>
</body>
</html>
