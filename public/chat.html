<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Messagerie - PetitsDjobs</title>
</head>
<body style="background:#e5ddd5; height: 100dvh; display: flex; flex-direction: column; margin:0;">
    <header class="home-header" style="background: #FF6600; color: white; padding: 10px 15px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button onclick="history.back()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">←</button>
            <img id="header-avatar" src="default-profile.png" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);">
            <div>
                <div id="header-name" style="font-weight:bold; font-size: 1.1rem;">Chargement...</div>
                <div id="header-status" style="font-size: 0.75rem; opacity: 0.8;">en ligne</div>
            </div>
        </div>
    </header>

    <div id="legal-warning" style="background: #fff5f5; color: #b71c1c; padding: 10px; font-size: 0.75rem; text-align: center; border-bottom: 1px solid #ffcdd2; font-weight: bold; line-height: 1.3;">
        ⚠️ RÈGLE DE SÉCURITÉ : Tout contrat conclu dans ce chat (même entre amis) doit être payé sur le site. En cas de fraude, les deux parties s'exposent à des poursuites et une amende minimale de 10.000.000 FCFA.
    </div>

    <div id="chat-box" class="chat-container">
        <!-- Les bulles s'afficheront ici -->
    </div>

    <div style="padding:10px; background:#f0f0f0; display:flex; gap:8px; align-items:center;">
        <button id="btn-mic" class="btn-mic">🎤</button>
        <input type="text" id="chat-input" placeholder="Taper un message" style="flex:1; padding:12px 18px; border-radius:25px; border:none; outline:none; font-size:1rem;">
        <button id="btn-send" style="background:#FF6600; color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const missionId = params.get('missionId');
        const amiId = params.get('amiId');

        let userId = null;
        let userIsPrestataire = false;
        let lastCount = 0;
        let partnerId = null;
        let partnerIsPrestataire = false;
        let missionProId = null; // Variable globale pour identifier le pro

        fetch('/get-user-data').then(r => r.json()).then(u => {
            userId = u.id;
            userIsPrestataire = u.isPrestataire;
            console.log("[DEBUG CHAT] Moi:", { userId, userIsPrestataire });
            loadHeaderInfo();
            loadMessages();
            setInterval(loadMessages, 3000);
        });

        async function loadHeaderInfo() {
            const hasAmi = amiId && amiId !== 'undefined' && amiId !== 'null';
            const hasMission = missionId && missionId !== 'undefined' && missionId !== 'null';

            if (!partnerId) {
                if (hasAmi) {
                    partnerId = amiId;
                } else if (hasMission) {
                    console.log("[DEBUG] Récupération des rôles de la mission:", missionId);
                    // On récupère les détails de la mission pour savoir qui est le PRO
                    const resM = await fetch('/api/statut-mission?missionId=' + missionId).then(r => r.json());
                    const d = await fetch('/api/get-mission-partner/' + missionId).then(r => r.json());
                    
                    missionProId = d.prestataireId || d.partnerId; // On identifie le pro
                    partnerId = d.partnerId;
                }
            }
            
            if (!partnerId) return;

            const res = await fetch('/api/partner-info/' + partnerId);
            const p = await res.json();
            if (p.nom) {
                document.getElementById('header-name').innerText = p.prenom + ' ' + p.nom;
                document.getElementById('header-avatar').src = p.photo;
                document.getElementById('header-status').innerText = p.enLigne ? 'en ligne' : 'hors ligne';
                console.log("[DEBUG CHAT] Partenaire chargé ID:", partnerId);
                loadMessages(); 
            }
        }

        async function inviterAmi() {
            const res = await fetch('/api/inviter-ami', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targetId: partnerId })
            });
            if (res.ok) alert("Invitation envoyée !");
        }

        async function loadMessages() {
            const hasMission = missionId && missionId !== 'undefined' && missionId !== 'null';
            const hasAmi = amiId && amiId !== 'undefined' && amiId !== 'null';
            
            if (!hasMission && !hasAmi) return;

            const url = hasMission ? `/api/get-messages/${missionId}` : `/api/get-messages-ami/${amiId}`;
            const res = await fetch(url);
            const messages = await res.json();
            if (!res.ok) { console.error("Erreur chargement messages"); return; }
            
            const box = document.getElementById('chat-box');
            
            if (Array.isArray(messages) && messages.length !== lastCount) {
                box.innerHTML = messages.map(m => {
                    const isMe = parseInt(m.sender_id) === parseInt(userId);
                    const isPresta = isMe ? userIsPrestataire : partnerIsPrestataire;
                    const styleClass = isPresta ? 'presta-style' : 'client-style';
                    const dateObj = new Date(m.created_at);
                    const time = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const date = dateObj.toLocaleDateString([], {day: '2-digit', month: '2-digit'});
                    return `
                        <div class="message-bubble ${isMe ? 'me' : 'other'} ${styleClass}">
                            ${m.text}
                            <span class="message-time">${date} à ${time}</span>
                        </div>
                    `;
                }).join('');
                setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
                lastCount = messages.length;
            }
        }

        // --- GESTION VOCALE (CORRIGÉE) ---
        let mediaRecorder;
        let audioChunks = [];
        const micBtn = document.getElementById('btn-mic');

        micBtn.onclick = async () => {
            console.log("[DEBUG VOICE] Clic micro détecté");
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        micBtn.innerText = '⌛';
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('audio', audioBlob);
                        
                        console.log("[DEBUG VOICE] Envoi du fichier au serveur...");
                        const uploadRes = await fetch('/api/upload-vocal', { method: 'POST', body: formData });
                        const uploadData = await uploadRes.json();
                        
                        if (uploadData.url) {
                            await fetch('/api/send-message', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                missionId: missionId, 
                                amiId: amiId, 
                                voiceUrl: uploadData.url 
                            })
                            });
                            loadMessages();
                        }
                        micBtn.innerText = '🎤';
                        micBtn.classList.remove('recording');
                    };

                    mediaRecorder.start();
                    micBtn.classList.add('recording');
                    micBtn.innerText = '🛑';
                    console.log("[DEBUG VOICE] Enregistrement démarré");
                } catch (err) {
                    console.error("[DEBUG VOICE] Erreur micro:", err);
                    alert("Impossible d'accéder au micro. Vérifiez les autorisations de votre navigateur.");
                }
            } else {
                mediaRecorder.stop();
                console.log("[DEBUG VOICE] Enregistrement stoppé");
            }
        };

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            console.log("[DEBUG CHAT] Envoi du message...");
            
            const res = await fetch('/api/send-message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ missionId, amiId, text })
            });
            
            if (res.ok) {
                loadMessages();
            } else {
                console.error("[DEBUG CHAT] Échec de l'envoi");
            }
        };
    </script>
</body>
</html>
