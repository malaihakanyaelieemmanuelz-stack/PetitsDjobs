<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vortex - Portail Unifié</title>
    <style>
        .vortex-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #ffffff;
        }
        .vortex-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .vortex-logo-main {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }
        .vortex-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #FF6600;
            letter-spacing: -2px;
            margin: 0;
        }
        .vortex-subtitle {
            color: #2e7d32;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
        }
        .vortex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        .module-card {
            background: white;
            border: 2px solid #e8f5e9;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .module-card:hover {
            transform: translateY(-15px);
            border-color: #FF6600;
            box-shadow: 0 20px 40px rgba(255,102,0,0.1);
        }
        .module-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .module-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2e7d32;
            margin: 0 0 10px;
        }
        .module-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-vortex-enter {
            background: #FF6600;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .btn-vortex-enter:hover { background: #E65100; }
    </style>
</head>
<body>
    <div id="bg-logo-fixed" class="vortex-bg"></div>

    <div class="vortex-container">
        <div class="vortex-header">
            <svg class="vortex-logo-main" viewBox="0 0 100 100">
                <path fill="#FF6600" d="M50 50L20 35v30l30 15z"/>
                <path fill="#2e7d32" d="M50 50l30-15v30l-30 15z"/>
                <path fill="white" d="M50 50L20 35l30-15 30 15z"/>
            </svg>
            <h1 class="vortex-title">VORTEX</h1>
            <div class="vortex-subtitle">L'Écosystème Unifié</div>
        </div>
        
        <div class="vortex-grid">
            <!-- Module PetitsDjobs -->
            <div class="module-card" onclick="location.href='/jobs'">
                <svg class="module-logo" viewBox="0 0 100 100">
                    <path fill="#FF6600" d="M35 45a8 8 0 100-16 8 8 0 000 16zm30 20a8 8 0 100-16 8 8 0 000 16z"/>
                    <path fill="none" stroke="#FF6600" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" d="M20 75l20-20 15 15 25-35M80 35h-10M80 35v10"/>
                </svg>
                <h2 class="module-name">PetitsDjobs</h2>
                <p class="module-desc">Services de proximité et dépannage immédiat entre particuliers.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
            
            <!-- Module Vendia -->
            <div class="module-card" onclick="location.href='/vendia'">
                <svg class="module-logo" viewBox="0 0 100 100">
                    <path fill="#2e7d32" d="M25 35h50l5 10H20z"/>
                    <path fill="none" stroke="#2e7d32" stroke-width="4" d="M30 45l5 25h30l5-25"/>
                    <circle fill="#2e7d32" cx="40" cy="78" r="4"/>
                    <circle fill="#2e7d32" cx="60" cy="78" r="4"/>
                </svg>
                <h2 class="module-name">Vendia</h2>
                <p class="module-desc">Le supermarché local en ligne. Vos commerçants à portée de clic.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
            
            <!-- Module Profilio -->
            <div class="module-card" onclick="location.href='/profilio'">
                <svg class="module-logo" viewBox="0 0 100 100">
                    <rect x="15" y="15" width="70" height="70" fill="none" stroke="#2e7d32" stroke-width="6"/>
                    <path fill="#2e7d32" d="M35 50q5-5 15 0t15 0q-5 5-15 0t-15 0z"/>
                </svg>
                <h2 class="module-name">Profilio</h2>
                <p class="module-desc">Réseau de recrutement. Valorisez votre profil et trouvez un emploi.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
        </div>
    </div>
</body>
</html>
