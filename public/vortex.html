<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vortex - Portail Unifié</title>
    <style>
        .vortex-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #ffffff;
        }
        .vortex-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .vortex-logo-main {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }
        .vortex-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #FF6600;
            letter-spacing: -2px;
            margin: 0;
        }
        .vortex-subtitle {
            color: #2e7d32;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
        }
        .vortex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        .module-card {
            background: white;
            border: 2px solid #e8f5e9;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .module-card:hover {
            transform: translateY(-15px);
            border-color: #FF6600;
            box-shadow: 0 20px 40px rgba(255,102,0,0.1);
        }
        .module-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .module-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2e7d32;
            margin: 0 0 10px;
        }
        .module-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn-vortex-enter {
            background: #FF6600;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .btn-vortex-enter:hover { background: #E65100; }
    </style>
</head>
<body>
    <div id="bg-logo-fixed" class="vortex-bg"></div>

    <div class="vortex-container">
        <div class="vortex-header">
            <svg class="vortex-logo-main" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path fill="#FF6600" d="M83 45.2c-.1-.9-.3-1.8-.5-2.7l11.4-5.3-6-10.4-11.9 6.7c-1.3-1.6-2.8-3.1-4.4-4.3l5.4-11.4-10.4-6-6.1 11c-1.8-.4-3.6-.7-5.4-.8V10h-12v11.7c-1.8.1-3.6.3-5.4.8L32.6 11.1l-10.4 6 5.4 11.4c-1.6 1.3-3.1 2.8-4.4 4.4L11.8 27.7l-6 10.4 11.1 6.1c-.4 1.8-.7 3.6-.8 5.4H5.9v12h11.7c.1 1.8.3 3.6.8 5.4l-11.1 6.1 6 10.4 11.4-5.4c1.3 1.6 2.8 3.1 4.4 4.3l-5.3 11.4 10.4 6 6.1-11c1.8.4 3.6.7 5.4.8V90.1h12V78.4c1.8-.1 3.6-.3 5.4-.8l6.1 11 10.4-6-5.4-11.4c1.6-1.3 3.1-2.8 4.4-4.4l11.5 5.3 6-10.4-11.1-6.1c.4-1.8.7-3.6.8-5.4H90.1v-12H83z"/>
                <circle cx="50" cy="50" r="18" fill="#FFFFFF"/>
                <circle cx="50" cy="50" r="10" fill="#2e7d32"/>
            </svg>
            <h1 class="vortex-title">VORTEX</h1>
            <div class="vortex-subtitle">L'Écosystème Unifié</div>
        </div>
        
        <div class="vortex-grid">
            <!-- Module PetitsDjobs -->
            <div class="module-card" onclick="location.href='/jobs'">
                <svg class="module-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FF6600" d="M83 45.2c-.1-.9-.3-1.8-.5-2.7l11.4-5.3-6-10.4-11.9 6.7c-1.3-1.6-2.8-3.1-4.4-4.3l5.4-11.4-10.4-6-6.1 11c-1.8-.4-3.6-.7-5.4-.8V10h-12v11.7c-1.8.1-3.6.3-5.4.8L32.6 11.1l-10.4 6 5.4 11.4c-1.6 1.3-3.1 2.8-4.4 4.4L11.8 27.7l-6 10.4 11.1 6.1c-.4 1.8-.7 3.6-.8 5.4H5.9v12h11.7c.1 1.8.3 3.6.8 5.4l-11.1 6.1 6 10.4 11.4-5.4c1.3 1.6 2.8 3.1 4.4 4.3l-5.3 11.4 10.4 6 6.1-11c1.8.4 3.6.7 5.4.8V90.1h12V78.4c1.8-.1 3.6-.3 5.4-.8l6.1 11 10.4-6-5.4-11.4c1.6-1.3 3.1-2.8 4.4-4.4l11.5 5.3 6-10.4-11.1-6.1c.4-1.8.7-3.6.8-5.4H90.1v-12H83zM50 65.1c-8.3 0-15-6.7-15-15s6.7-15 15-15 15 6.7 15 15-6.7 15-15 15z"/>
                </svg>
                <h2 class="module-name">PetitsDjobs</h2>
                <p class="module-desc">Services de proximité et dépannage immédiat entre particuliers.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
            
            <!-- Module Vendia -->
            <div class="module-card" onclick="location.href='/vendia'">
                <svg class="module-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#2e7d32" d="M83 45.2c-.1-.9-.3-1.8-.5-2.7l11.4-5.3-6-10.4-11.9 6.7c-1.3-1.6-2.8-3.1-4.4-4.3l5.4-11.4-10.4-6-6.1 11c-1.8-.4-3.6-.7-5.4-.8V10h-12v11.7c-1.8.1-3.6.3-5.4.8L32.6 11.1l-10.4 6 5.4 11.4c-1.6 1.3-3.1 2.8-4.4 4.4L11.8 27.7l-6 10.4 11.1 6.1c-.4 1.8-.7 3.6-.8 5.4H5.9v12h11.7c.1 1.8.3 3.6.8 5.4l-11.1 6.1 6 10.4 11.4-5.4c1.3 1.6 2.8 3.1 4.4 4.3l-5.3 11.4 10.4 6 6.1-11c1.8.4 3.6.7 5.4.8V90.1h12V78.4c1.8-.1 3.6-.3 5.4-.8l6.1 11 10.4-6-5.4-11.4c1.6-1.3 3.1-2.8 4.4-4.4l11.5 5.3 6-10.4-11.1-6.1c.4-1.8.7-3.6.8-5.4H90.1v-12H83z"/>
                    <circle cx="50" cy="50" r="15" fill="white"/>
                </svg>
                <h2 class="module-name">Vendia</h2>
                <p class="module-desc">Le supermarché local en ligne. Vos commerçants à portée de clic.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
            
            <!-- Module Profilio -->
            <div class="module-card" onclick="location.href='/profilio'">
                <svg class="module-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#2e7d32" d="M83 45.2c-.1-.9-.3-1.8-.5-2.7l11.4-5.3-6-10.4-11.9 6.7c-1.3-1.6-2.8-3.1-4.4-4.3l5.4-11.4-10.4-6-6.1 11c-1.8-.4-3.6-.7-5.4-.8V10h-12v11.7c-1.8.1-3.6.3-5.4.8L32.6 11.1l-10.4 6 5.4 11.4c-1.6 1.3-3.1 2.8-4.4 4.4L11.8 27.7l-6 10.4 11.1 6.1c-.4 1.8-.7 3.6-.8 5.4H5.9v12h11.7c.1 1.8.3 3.6.8 5.4l-11.1 6.1 6 10.4 11.4-5.4c1.3 1.6 2.8 3.1 4.4 4.3l-5.3 11.4 10.4 6 6.1-11c1.8.4 3.6.7 5.4.8V90.1h12V78.4c1.8-.1 3.6-.3 5.4-.8l6.1 11 10.4-6-5.4-11.4c1.6-1.3 3.1-2.8 4.4-4.4l11.5 5.3 6-10.4-11.1-6.1c.4-1.8.7-3.6.8-5.4H90.1v-12H83zM50 65.1c-8.3 0-15-6.7-15-15s6.7-15 15-15 15 6.7 15 15-6.7 15-15 15z"/>
                </svg>
                <h2 class="module-name">Profilio</h2>
                <p class="module-desc">Réseau de recrutement. Valorisez votre profil et trouvez un emploi.</p>
                <span class="btn-vortex-enter">Entrer</span>
            </div>
        </div>
    </div>
</body>
</html>
