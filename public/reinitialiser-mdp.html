<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nouveau mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header"><a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a></header>
    <div class="auth-page" style="padding: 50px 20px;">
        <div class="login-card">
            <h1>NOUVEAU MDP</h1>
            <p style="color:#666; margin-bottom:20px;">Entrez le code reçu par email et votre nouveau mot de passe.</p>
            <form id="resetForm">
                <input type="text" id="code" placeholder="CODE À 6 CHIFFRES" required maxlength="6">
                <input type="password" id="new-password" placeholder="NOUVEAU MOT DE PASSE" required minlength="8">
                <button type="submit">VALIDER LE CHANGEMENT</button>
            </form>
        </div>
    </div>
    <script>
        const email = new URLSearchParams(window.location.search).get('email');
        
        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const password = document.getElementById('new-password').value;

            const res = await fetch('/api/reinitialiser-mdp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, code, password })
            });

            if (res.ok) {
                alert("Mot de passe mis à jour ! Connectez-vous.");
                window.location.href = '/connexion';
            } else {
                const data = await res.json();
                alert(data.error);
            }
        }
    </script>
</body>
</html>
