<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
t    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%238B4513'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%238B4513'/%3E%3Cpath d='M15 50 L95 50' stroke='%23000000' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%23000000' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Nouveau mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none;">
                <h1>
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#8B4513"/>
                            <rect x="50" y="30" width="30" height="40" fill="#8B4513"/>
                            <path d="M15 50 L95 50" stroke="#000000" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#000000" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="connexion.html">CONNEXION</a>
                <a href="inscription.html">INSCRIPTION</a>
            </nav>
        </div>
    </header>
    <div class="auth-page">
        <div class="login-card">
            <h1>NOUVEAU MDP</h1>
            <p style="color:#666; margin-bottom:20px;">Entrez le code reçu par email et votre nouveau mot de passe.</p>
            <p id="msg-status" style="display:none; color:#2e7d32; font-weight:bold; margin-bottom:10px;"></p>
            <form id="resetForm">
                <input type="text" id="code" name="recup_code" placeholder="CODE À 6 CHIFFRES" required maxlength="6" autocomplete="off" style="text-align: center; letter-spacing: 5px; font-weight: bold;">
                <div style="position: relative; display: flex; align-items: center; margin: 10px 0; width: 100%">
                    <input type="password" id="new-password" name="new_pass_val" placeholder="NOUVEAU MOT DE PASSE" required minlength="8" style="padding-right: 40px; margin: 0; width: 100%;" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="new-password" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #333; padding: 0; width: auto;">👁️</button>
                </div>
                <button type="submit">VALIDER LE CHANGEMENT</button>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                this.textContent = '👁️';
            });
        });

        const email = new URLSearchParams(window.location.search).get('email');
        
        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const password = document.getElementById('new-password').value;

            const res = await fetch('/api/reinitialiser-mdp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, code, password })
            });

            if (res.ok) {
                const msg = document.getElementById('msg-status');
                msg.innerText = "✓ Mot de passe modifié ! Redirection...";
                msg.style.display = "block";
                // Redirection automatique après 1.5s pour que l'utilisateur voie le succès
                setTimeout(() => window.location.href = '/connexion', 1500);
            } else {
                const data = await res.json();
                alert(data.error);
            }
        }
    </script>
</body>
</html>
