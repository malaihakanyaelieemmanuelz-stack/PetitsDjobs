<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nouveau mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header"><a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a></header>
    <div class="auth-page" style="padding: 50px 20px;">
        <div class="login-card">
            <h1>NOUVEAU MDP</h1>
            <p style="color:#666; margin-bottom:20px;">Entrez le code reçu par email et votre nouveau mot de passe.</p>
            <form id="resetForm">
                <input type="text" id="code" name="reset_code_user" placeholder="CODE À 6 CHIFFRES" required maxlength="6" autocomplete="off" style="text-align: center; letter-spacing: 5px; font-weight: bold;">
                <div style="position: relative; display: flex; align-items: center; margin: 10px 0; width: 100%;">
                    <input type="password" id="new-password" name="new_password_user" placeholder="NOUVEAU MOT DE PASSE" required minlength="8" style="padding-right: 40px; margin: 0; width: 100%;" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="new-password" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #333; padding: 0; width: auto;">👁️</button>
                </div>
                <button type="submit">VALIDER LE CHANGEMENT</button>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const type = target.type === 'password' ? 'text' : 'password';
                target.type = type;
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        const email = new URLSearchParams(window.location.search).get('email');
        
        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const password = document.getElementById('new-password').value;

            const res = await fetch('/api/reinitialiser-mdp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, code, password })
            });

            if (res.ok) {
                alert("Mot de passe mis à jour ! Connectez-vous.");
                window.location.href = '/connexion';
            } else {
                const data = await res.json();
                alert(data.error);
            }
        }
    </script>
</body>
</html>
