<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%23FF6600'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%23FF6600'/%3E%3Cpath d='M15 50 L95 50' stroke='%232e7d32' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%232e7d32' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Nouveau mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; display:flex; align-items:center; gap:10px;">
                    <svg class="home-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <path d="M40 100 C 40 40, 160 40, 160 100 C 160 160, 40 160, 40 100" fill="none" stroke="#009E60" stroke-width="20" stroke-dasharray="100 20"/>
                        <path d="M100 60 L140 100 L100 140" fill="none" stroke="#009E60" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="connexion.html">CONNEXION</a>
                <a href="inscription.html">INSCRIPTION</a>
            </nav>
        </div>
    </header>
    <div class="auth-page">
        <div class="login-card signup-card">
            <h1>NOUVEAU MDP</h1>
            <p style="color:#2e7d32; margin-bottom:20px;">Entrez le code reçu par email et votre nouveau mot de passe.</p>
            <p id="msg-status" style="display:none; color:#2e7d32; font-weight:bold; margin-bottom:10px;"></p>
            <form id="resetForm">
                <input type="text" id="code" name="recup_code" placeholder="CODE À 6 CHIFFRES" required maxlength="6" autocomplete="off" style="text-align: center; letter-spacing: 5px; font-weight: bold; display: block; margin: 10px auto; max-width: 220px;">
                <div class="password-group">
                    <input type="password" id="new-password" name="new_pass_val" placeholder="NOUVEAU MOT DE PASSE" required minlength="8" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="new-password"></button>
                </div>
                <button type="submit">VALIDER LE CHANGEMENT</button>
            </form>
        </div>
    </div>
    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                this.classList.toggle('visible');
            });
        });

        const email = new URLSearchParams(window.location.search).get('email');
        
        document.getElementById('resetForm').onsubmit = async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const password = document.getElementById('new-password').value;

            const res = await fetch('/api/reinitialiser-mdp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, code, password })
            });

            if (res.ok) {
                const msg = document.getElementById('msg-status');
                msg.innerText = "✓ Mot de passe modifié ! Redirection...";
                msg.style.display = "block";
                // Redirection automatique après 1.5s pour que l'utilisateur voie le succès
                setTimeout(() => window.location.href = '/connexion', 1500);
            } else {
                const data = await res.json();
                alert(data.error);
            }
        }
    </script>
</body>
</html>
