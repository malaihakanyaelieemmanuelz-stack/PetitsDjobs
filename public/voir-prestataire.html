<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Profil Prestataire - PetitsDjobs</title>
</head>
<body style="background:#f4f4f4; margin:0;">
    <div id="bg-logo-fixed" style="position: fixed !important;"></div>
    <div id="carte" class="android-profile-view">
        <p style="padding:60px; text-align:center; color:#2e7d32;">Chargement du profil...</p>
    </div>

    <script>
        const servicePrices = {
            'Cuisine': 1500, 'Lavage': 800, 'Vaisselle': 400,
            'Course': 500, 'Chauffeur': 3000, 'Ménage': 1000,
            'Maquillage': 2000, 'Coiffure': 2500, 'Remplacement': 500,
            'Particulier': 0
        };

        const id = new URLSearchParams(location.search).get('id');
        if (!id) {
            document.getElementById('carte').innerHTML = '<p style="color:#FF6600;">Profil introuvable.</p>';
        } else {
            fetch('/prestataire-public/' + id).then(r => r.json()).then(p => {
                if (!p.nom) {
                    document.getElementById('carte').innerHTML = '<p style="color:#FF6600;">Profil introuvable.</p>';
                    return;
                }
                const nom = [p.prenom, p.nom].filter(Boolean).join(' ');
                const avis = (p.commentaires && p.commentaires.length)
                    ? p.commentaires.map(c => `<li style="padding:12px 0; border-bottom:1px solid #e8f5e9; color:#2e7d32;">${typeof c === 'string' ? c : c.texte}</li>`).join('')
                    : '<li style="color:#FF6600; padding:10px 0;">Aucun avis pour le moment.</li>';

                const listeServices = (p.services || 'Services divers').split(',').map(s => s.trim()).filter(s => s.toLowerCase() !== 'tout');

                const boutonsServices = listeServices.map(s => `
                    <label class="service-item-new" onclick="commanderDirectement('${p.id}', '${s.replace(/'/g, "\\'")}')">
                        <div style="display:flex; flex-direction:column; text-align:left;">
                            <span style="text-transform:uppercase; color:#2e7d32;">${s}</span>
                            <small style="color:#FF6600;">${servicePrices[s] ? servicePrices[s] + ' FCFA' : 'Prix à discuter'}</small>
                        </div>
                        <span style="color:#FF6600; font-weight:bold;">➔</span>
                    </label>
                `).join('');

                document.getElementById('carte').innerHTML = `
                    <div class="hero-premium presta-hero-compact">
                        <button class="btn-back" onclick="history.back()">←</button>
                        <button onclick="inviterAmi('${p.id}')" style="position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 10px; border-radius:10px; font-size:0.7rem; font-weight:bold; cursor:pointer;">INVITATION</button>
                        <div class="profile-wrapper">
                            <img src="${p.photo || 'default-profile.png'}" alt="">
                            <div class="status-dot ${p.enLigne ? 'online' : ''}"></div>
                        </div>
                        <h2 style="margin:8px 0 0; font-size:1.5rem; font-weight:900;">${nom}</h2>
                        <p style="margin:4px 0; color:#e8f5e9; font-weight:bold;">${p.profession || '-'}</p>
                        <p style="margin:0; font-size:0.85rem; color:${p.enLigne ? '#c8e6c9' : 'rgba(255,255,255,0.7)'};">${p.enLigne ? '● EN LIGNE' : '○ HORS LIGNE'} · ⭐ ${p.etoiles || 0}</p>
                    </div>

                    <div class="content-main">
                        <div class="orient-client-line">Prestataire → vers vous (client)</div>

                        <div class="bio-card" style="text-align:left; font-size:0.95rem;">${p.bio || 'Votre satisfaction est ma priorité.'}</div>

                        <div id="section-realisations" style="display:none; text-align:left;">
                            <h3 style="color:#2e7d32; font-weight:900; font-size:0.95rem;">📸 Réalisations</h3>
                            <div id="grid-realisations" class="realisations-grid"></div>
                        </div>

                        <div class="service-selection-title presta-services-compact">Choisir un service</div>
                        <div id="services-selection">${boutonsServices}</div>

                        <button class="btn-outline" style="width:100%; min-height:52px; border-radius:16px; margin-top:12px; font-weight:900;" onclick="inviterAmi('${p.id}')">🤝 DEVENIR AMIS</button>

                        <div class="reviews-section">
                            <h3>RETOURS CLIENTS</h3>
                            <ul style="padding:0; list-style:none; text-align:left;">${avis}</ul>
                        </div>
                    </div>`;

                fetch('/api/get-user-showcase/' + p.id).then(r => r.json()).then(items => {
                    if (items && items.length > 0) {
                        document.getElementById('section-realisations').style.display = 'block';
                        document.getElementById('grid-realisations').innerHTML = items.map(item => `
                            <div class="realisation-item">
                                ${item.media_type && item.media_type.includes('video') ?
                                    `<video src="${item.url}" controls playsinline style="width:100%; height:100%; object-fit:cover;"></video>` :
                                    `<img src="${item.url}" alt="Réalisation">`
                                }
                            </div>
                        `).join('');
                    }
                });
            });
        }

        async function commanderDirectement(pid, serviceNom) {
            await fetch('/preparer-commande', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ service: serviceNom, prix: servicePrices[serviceNom] || 0 })
            });
            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prestataireId: pid, serviceChoisi: serviceNom })
            });
            if (res.ok) window.location.href = '/commande';
        }

        async function inviterAmi(pid) {
            const res = await fetch('/api/inviter-ami', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetId: pid })
            });
            const data = await res.json();
            alert(data.message || data.error);
        }
    </script>
</body>
</html>
