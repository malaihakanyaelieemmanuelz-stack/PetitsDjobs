<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Profil Prestataire - PetitsDjobs</title>
    <style>
        .android-profile-view {
            min-height: 100dvh; width: 100%; max-width: 600px;
            margin: 0 auto; background: #ffffff; display: flex;
            flex-direction: column; box-sizing: border-box;
        }
        .hero-premium {
            background: linear-gradient(180deg, #5D4037 0%, #3e2723 100%);
            color: white; padding: 60px 20px 50px; text-align: center;
            position: relative; border-radius: 0 0 50px 50px;
        }
        .hero-premium .btn-back {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.15); border: none;
            color: white; width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-wrapper {
            position: relative; display: inline-block; margin-bottom: 15px;
        }
        .profile-wrapper img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.9); object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
        .status-dot {
            position: absolute; bottom: 12px; right: 12px;
            width: 22px; height: 22px; border-radius: 50%;
            border: 4px solid white; background: #ccc;
        }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 10px #4caf50; }

        .content-main { padding: 0 25px 40px; text-align: center; }
        .premium-label {
            font-size: 0.7rem; font-weight: 900; color: #aaa;
            text-transform: uppercase; letter-spacing: 2px;
            margin: 25px 0 5px; display: block;
        }
        .premium-value { font-size: 1.4rem; font-weight: 800; color: #333; }
        
        .bio-card {
            background: #fdfaf9; padding: 25px; border-radius: 25px;
            border: 1px solid #f2ece9; margin: 20px 0;
            font-style: italic; color: #555; line-height: 1.6;
        }

        .service-selection-title {
            color: #5D4037; font-weight: 900; font-size: 1.1rem;
            margin: 35px 0 15px; text-transform: uppercase;
        }
        .service-item-new {
            display: flex; align-items: center; justify-content: space-between;
            background: #ffffff; padding: 20px 25px; border-radius: 20px;
            border: 2px solid #eee; margin-bottom: 12px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .service-item-new.selected { border-color: #5D4037; background: #fbf9f8; }
        .service-item-new span { font-weight: 700; color: #333; font-size: 1.1rem; }
        .service-item-new input { width: 24px; height: 24px; accent-color: #5D4037; }

        .btn-reserve-xl {
            width: 100%; min-height: 75px; background: #5D4037;
            color: white; border: none; border-radius: 22px;
            font-size: 1.3rem; font-weight: 900; margin-top: 30px;
            box-shadow: 0 12px 25px rgba(93, 64, 55, 0.3);
            letter-spacing: 1px;
        }
        .reviews-section {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;
        }
    </style>
</head>
<body style="background:#f4f4f4; margin:0;">
    <div id="carte" class="android-profile-view">
        <p style="padding:60px; text-align:center; color:#666;">Chargement du profil...</p>
    </div>

    <script>
        const id = new URLSearchParams(location.search).get('id');
        if (!id) {
            document.getElementById('carte').innerHTML = '<p>Profil introuvable.</p>';
        } else {
            fetch('/prestataire-public/' + id).then(r => r.json()).then(p => {
                if (!p.nom) {
                    document.getElementById('carte').innerHTML = '<p>Profil introuvable.</p>';
                    return;
                }
                const nom = [p.prenom, p.nom].filter(Boolean).join(' ');
                const avis = (p.commentaires && p.commentaires.length) 
                    ? p.commentaires.map(c => `<li style="padding:15px 0; border-bottom:1px solid #eee; color:#555; font-size:0.95rem;">${typeof c === 'string' ? c : c.texte}</li>`).join('') 
                    : '<li style="color:#888; padding:10px 0;">Aucun avis pour le moment.</li>';

                const listeServices = (p.services || 'Services divers')
                    .split(',')
                    .map(s => s.trim())
                    .filter(s => s.toLowerCase() !== 'tout');

                const checkboxesServices = listeServices.map(s => `
                    <label class="service-item-new" onclick="this.classList.toggle('selected')">
                        <span>${s}</span>
                        <input type="checkbox" class="service-checkbox" value="${s}">
                    </label>
                `).join('');

                document.getElementById('carte').innerHTML = `
                    <div class="hero-premium">
                        <button class="btn-back" onclick="history.back()">←</button>
                        <div class="profile-wrapper">
                            <img src="${p.photo || 'default-profile.png'}" alt="">
                            <div class="status-dot ${p.enLigne ? 'online' : ''}"></div>
                        </div>
                        <h2 style="margin:0; font-size:2rem; letter-spacing:-1px; font-weight:900;">${nom}</h2>
                        <div style="margin-top:10px; font-size:1.2rem; opacity:0.9;">⭐ ${p.etoiles || 0} / 5</div>
                    </div>
                    
                    <div class="content-main">
                        <span class="premium-label">Spécialiste en</span>
                        <div class="premium-value">${p.profession || '-'}</div>
                        
                        <div class="bio-card">
                            "${p.bio || 'Votre satisfaction est ma priorité.'}"
                        </div>

                        <div class="service-selection-title">Que souhaitez-vous ?</div>
                        <div id="services-selection">${checkboxesServices}</div>
                        
                        <button id="btn-valider-multi" class="btn-reserve-xl" onclick="validerSelection('${p.id}')">
                            RÉSERVER CE PRESTATAIRE
                        </button>

                        <div class="reviews-section">
                            <h3 style="color:#5D4037; font-weight:900;">RETOURS CLIENTS</h3>
                            <ul style="padding:0; list-style:none; text-align:left;">${avis}</ul>
                        </div>
                    </div>`;
            });
        }

        async function validerSelection(pid) {
            const checkboxes = document.querySelectorAll('.service-checkbox:checked');
            if (checkboxes.length === 0) {
                alert("Veuillez sélectionner au moins un service.");
                return;
            }

            const servicesSelectionnes = Array.from(checkboxes).map(cb => cb.value).join(', ');

            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prestataireId: pid, serviceChoisi: servicesSelectionnes })
            });
            if (res.ok) {
                window.location.href = `/commande`;
            } else {
                alert("Erreur lors de la sélection.");
            }
        }
    </script>
</body>
</html>
