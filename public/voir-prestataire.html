<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Profil prestataire</title>
</head>
<body>
    <header class="home-header">
        <a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a>
    </header>
    <nav class="nav-bar"><a href="javascript:history.back()">← Retour</a></nav>

    <div class="trust-card" id="carte">
        <p style="padding:40px;">Chargement du profil...</p>
    </div>

    <script>
        const id = new URLSearchParams(location.search).get('id');
        if (!id) {
            document.getElementById('carte').innerHTML = '<p>Profil introuvable.</p>';
        } else {
            fetch('/prestataire-public/' + id).then(r => r.json()).then(p => {
                if (!p.nom) {
                    document.getElementById('carte').innerHTML = '<p>Profil introuvable.</p>';
                    return;
                }
                const nom = [p.prenom, p.nom].filter(Boolean).join(' ');
                const avis = (p.commentaires && p.commentaires.length) 
                    ? p.commentaires.map(c => '<li>' + (typeof c === 'string' ? c : c.texte) + '</li>').join('') 
                    : '<li>Pas encore d\'avis — soyez le premier !</li>';

                // On transforme la chaîne en liste de cases à cocher, en excluant "Tout"
                const listeServices = (p.services || 'Services divers')
                    .split(',')
                    .map(s => s.trim())
                    .filter(s => s.toLowerCase() !== 'tout');

                const checkboxesServices = listeServices.map(s => `
                    <label style="display: flex; align-items: center; gap: 12px; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 8px; cursor: pointer;">
                        <input type="checkbox" class="service-checkbox" value="${s}" style="width: 20px; height: 20px;">
                        <span style="font-weight: 500; color: #333;">${s}</span>
                    </label>
                `).join('');

                document.getElementById('carte').innerHTML = `
                    <div class="trust-card-header">
                        <img src="${p.photo || ''}" alt="">
                        <h2 style="margin:0;">${nom}</h2>
                        <p style="margin:8px 0 0; opacity:0.9;">⭐ ${p.etoiles || 0} / 5</p>
                    </div>
                    <div class="trust-card-body">
                        <p><strong>Métier :</strong> ${p.profession || '-'}</p>
                        <p style="font-style:italic; color:#555;">"${p.bio || 'Personne de confiance sur PetitsDjobs.'}"</p>
                        <h3 style="margin-top:20px; color:#5D4037;">Sélectionnez vos besoins :</h3>
                        <div id="services-selection" style="margin-bottom:20px;">${checkboxesServices}</div>
                        <button id="btn-valider-multi" class="btn-primary-sm" style="width:100%; margin-bottom: 20px;" onclick="validerSelection('${p.id}')">
                            Commander les services sélectionnés
                        </button>
                        <h3>Avis</h3>
                        <ul style="padding-left:20px;">${avis}</ul>
                    </div>`;
            });
        }

        async function validerSelection(pid) {
            const checkboxes = document.querySelectorAll('.service-checkbox:checked');
            if (checkboxes.length === 0) {
                alert("Veuillez sélectionner au moins un service.");
                return;
            }

            const servicesSelectionnes = Array.from(checkboxes).map(cb => cb.value).join(', ');

            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prestataireId: pid, serviceChoisi: servicesSelectionnes })
            });
            if (res.ok) {
                window.location.href = `/commande`;
            } else {
                alert("Erreur lors de la sélection.");
            }
        }
    </script>
</body>
</html>
