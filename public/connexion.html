<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%23FF6600'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%23FF6600'/%3E%3Cpath d='M15 50 L95 50' stroke='%232e7d32' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%232e7d32' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Connexion</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content">
            <a href="index.html?v=2" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; display:flex; align-items:center; gap:10px;">
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#FF6600"/>
                            <rect x="50" y="30" width="30" height="40" fill="#FF6600"/>
                            <path d="M15 50 L95 50" stroke="#2e7d32" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#2e7d32" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="index.html">ACCUEIL</a>
                <a href="inscription.html">INSCRIPTION</a>
            </nav>
        </div>
    </header>

    <div class="auth-page">
        <div class="login-card">
            <h1>CONNEXION</h1>
            <form id="loginForm" action="/connexion" method="POST">
                <div id="champs-compte">
                    <input type="email" name="email" id="email" placeholder="EMAIL" required autocomplete="username">
                    <div class="password-group">
                        <input type="password" name="password" id="password" placeholder="MOT DE PASSE" required autocomplete="current-password">
                        <button type="button" class="toggle-password" data-target="password"></button>
                    </div>
                </div>
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lon" id="lon">
                <input type="hidden" name="locAccepted" id="locAccepted" value="1">
                <input type="hidden" name="polAccepted" id="polAccepted" value="1">

                <div class="options" style="text-align: left; margin: 10px 0; font-size: 0.9rem;">
                    <label>
                        <input type="checkbox" name="remember" id="remember"> Rester connecté
                    </label>
                </div>

                <button type="submit" id="btn-connect">SE CONNECTER</button>
                
                <div style="margin-top:15px;">
                    <a href="/recuperation-mdp" style="font-size:0.85rem; color:#666; text-decoration:none;">Mot de passe oublié ?</a>
                </div>
            </form>
            <p id="erreur-msg" style="color:#c62828; font-size:0.9rem; display:none;"></p>
            <p style="margin-top: 15px; font-size: 0.9rem;">
                Pas de compte ? <a href="inscription.html">Inscrivez-vous</a>
            </p>
            <a href="index.html?v=2" class="home-auth-btn" style="display:inline-block; margin-top:16px; text-decoration:none;">← RETOUR À L'ACCUEIL</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const champs = document.getElementById('champs-compte');

        // Afficher/Masquer le mot de passe
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                this.classList.toggle('visible');
            });
        });

        const params = new URLSearchParams(window.location.search);
        const err = params.get('erreur');
        const msg = document.getElementById('erreur-msg');
        if (err === 'mdp') msg.textContent = 'Mot de passe incorrect.';
        if (err === 'consentement') msg.textContent = 'Acceptez la localisation et la politique.';
        if (err === 'compte') msg.textContent = 'Compte introuvable. Inscrivez-vous d\'abord.';
        if (err === 'serveur') msg.textContent = 'Erreur technique. Veuillez réessayer.';
        if (err) msg.style.display = 'block';

        fetch('/session-status').then(r => r.json()).then(s => {
            if (s.loggedIn) window.location.href = 'index.html?v=2';
        }).catch(() => {});

        form.onsubmit = function(e) {
            if (champs.style.display !== 'none') {
                if (!document.getElementById('email').value || !document.getElementById('password').value) {
                    alert('Email et mot de passe requis.');
                    e.preventDefault();
                }
            }
        };
    </script>
</body>
</html>
