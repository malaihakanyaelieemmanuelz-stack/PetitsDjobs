<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Connexion</title>
</head>
<body>
    <!-- Diagnostic visuel -->
    <div id="android-debug-diag" style="background:#2e7d32; color:white; font-size:10px; padding:5px; text-align:center;">
        ✅ CORRECTIF ANDROID ACTIF | Viewport OK
    </div>

    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none;">
                <h1>
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#8B4513"/>
                            <rect x="50" y="30" width="30" height="40" fill="#8B4513"/>
                            <path d="M15 50 L95 50" stroke="#000000" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#000000" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="index.html">ACCUEIL</a>
                <a href="inscription.html">INSCRIPTION</a>
            </nav>
        </div>
    </header>

    <div class="auth-page">
        <div class="login-card">
            <h1>CONNEXION</h1>
            <p id="msg-remember" style="display:none; color:#5D4037; font-size:0.9rem; margin-bottom: 20px;">Session active — validez les cases ci-dessous pour continuer.</p>
            <form id="loginForm" action="/connexion" method="POST">
                <div id="champs-compte">
                    <input type="email" name="email" id="email" placeholder="EMAIL" required autocomplete="username">
                    <div style="position: relative; display: flex; align-items: center; margin: 10px 0;">
                        <input type="password" name="password" id="password" placeholder="MOT DE PASSE" required style="padding-right: 40px; margin: 0; width: 100%;" autocomplete="current-password">
                        <button type="button" class="toggle-password" data-target="password" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #333; padding: 0; width: auto;">👁️</button>
                    </div>
                </div>
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lon" id="lon">
                <input type="hidden" name="locAccepted" id="locAccepted" value="0">
                <input type="hidden" name="polAccepted" id="polAccepted" value="0">

                <div class="options" style="text-align: left; margin: 10px 0; font-size: 0.9rem;">
                    <label>
                        <input type="checkbox" name="remember" id="remember"> Rester connecté
                    </label>
                    <label>
                        <input type="checkbox" id="loc"> Autoriser la localisation
                    </label>
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="pol">
                        J'accepte la <a href="/politique">politique de confidentialité</a>
                    </label>
                </div>

                <button type="submit" id="btn-connect">SE CONNECTER</button>
                
                <div style="margin-top:15px;">
                    <a href="/recuperation-mdp" style="font-size:0.85rem; color:#666; text-decoration:none;">Mot de passe oublié ?</a>
                </div>
            </form>
            <p id="erreur-msg" style="color:#c62828; font-size:0.9rem; display:none;"></p>
            <p style="margin-top: 15px; font-size: 0.9rem;">
                Pas de compte ? <a href="inscription.html">Inscrivez-vous</a>
            </p>
            <a href="index.html" class="home-auth-btn" style="display:inline-block; margin-top:16px; text-decoration:none;">← RETOUR À L'ACCUEIL</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loc = document.getElementById('loc');
        const pol = document.getElementById('pol');
        const champs = document.getElementById('champs-compte');

        // Afficher/Masquer le mot de passe
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                this.textContent = '👁️';
            });
        });

        loc.addEventListener('change', () => {
            if (!loc.checked) return;
            if (!navigator.geolocation) {
                alert('Géolocalisation non supportée.');
                loc.checked = false;
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    document.getElementById('lat').value = pos.coords.latitude;
                    document.getElementById('lon').value = pos.coords.longitude;
                },
                () => alert('Autorisez la localisation.')
            );
        });

        const params = new URLSearchParams(window.location.search);
        const err = params.get('erreur');
        const msg = document.getElementById('erreur-msg');
        if (err === 'mdp') msg.textContent = 'Mot de passe incorrect.';
        if (err === 'consentement') msg.textContent = 'Acceptez la localisation et la politique.';
        if (err === 'compte') msg.textContent = 'Compte introuvable. Inscrivez-vous d\'abord.';
        if (err === 'serveur') msg.textContent = 'Erreur technique. Veuillez réessayer.';
        if (err) msg.style.display = 'block';

        fetch('/session-status').then(r => r.json()).then(s => {
            if (s.loggedIn) window.location.href = 'index.html';
            if (s.remember && s.loggedIn) {
                champs.style.display = 'none';
                document.getElementById('msg-remember').style.display = 'block';
            }
        }).catch(() => {});

        form.onsubmit = function(e) {
            if (!loc.checked || !pol.checked) {
                alert('Vous devez autoriser la localisation et accepter la politique.');
                e.preventDefault();
                return;
            }
            document.getElementById('locAccepted').value = '1';
            document.getElementById('polAccepted').value = '1';
            if (champs.style.display !== 'none') {
                if (!document.getElementById('email').value || !document.getElementById('password').value) {
                    alert('Email et mot de passe requis.');
                    e.preventDefault();
                }
            }
        };
    </script>
</body>
</html>
