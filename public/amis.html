<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mes Amis - PetitsDjobs</title>
</head>
<body style="background:#f4f4f4;">
    <header class="home-header">
        <div class="header-content">
            <a href="/profil" style="text-decoration:none; color:#5D4037; font-weight:bold;">← PROFIL</a>
            <h1 style="color:#5D4037;">MES AMIS</h1>
        </div>
    </header>

    <div class="app-wrap" style="padding-top:10px;">
        <div id="invitations-container" style="margin-bottom:20px;"></div>

        <div id="liste-amis" style="background:white; border-radius:15px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
            <p style="padding:30px; text-align:center; color:#888;">Chargement de vos contacts...</p>
        </div>
    </div>

    <script>
        async function chargerInvitations() {
            const res = await fetch('/api/mes-demandes-amis'); // Oups, correction du nom dans server.js ci-dessus
            const invits = await res.json();
            const container = document.getElementById('invitations-container');
            if (invits.length > 0) {
                container.innerHTML = `<h3 style="padding:10px; font-size:0.9rem;">DEMANDES REÇUES</h3>` + invits.map(i => `
                    <div class="friend-item" style="background:#fff9f0;">
                        <div style="flex:1;"><b>${i.user.prenom}</b> veut être votre ami.</div>
                        <button onclick="repondreInvit(${i.id}, 'accepte')" style="background:#2e7d32; color:white; border:none; padding:8px; border-radius:5px;">OUI</button>
                        <button onclick="repondreInvit(${i.id}, 'refuse')" style="background:#666; color:white; border:none; padding:8px; border-radius:5px; margin-left:5px;">NON</button>
                    </div>
                `).join('');
            }
        }

        async function repondreInvit(id, action) {
            await fetch('/api/repondre-invitation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ invitationId: id, action })
            });
            location.reload();
        }

        async function chargerAmis() {
            const res = await fetch('/api/liste-amis');
            const amis = await res.json();
            const container = document.getElementById('liste-amis');

            if (amis.length === 0) {
                container.innerHTML = '<p style="padding:40px; text-align:center;">Vous n\'avez pas encore d\'amis. Commandez un service pour faire des connaissances !</p>';
                return;
            }

            container.innerHTML = amis.map(a => `
                <div class="friend-item" onclick="location.href='/chat.html?amiId=${a.id}'">
                    <img src="${a.photo || 'default-profile.png'}">
                    <div style="flex:1;">
                        <div style="font-weight:800; font-size:1.1rem; color:#333;">${a.prenom} ${a.nom}</div>
                        <div style="font-size:0.85rem; color:#888;">${a.profession || 'Ami PetitsDjobs'}</div>
                    </div>
                    <div style="color:#5D4037;">➔</div>
                </div>
            `).join('');
        }
        chargerAmis();
    </script>
</body>
</html>
