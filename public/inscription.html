<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%23FF6600'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%23FF6600'/%3E%3Cpath d='M15 50 L95 50' stroke='%232e7d32' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%232e7d32' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Inscription - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; display:flex; align-items:center; gap:10px;">
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#FF6600"/>
                            <rect x="50" y="30" width="30" height="40" fill="#FF6600"/>
                            <path d="M15 50 L95 50" stroke="#2e7d32" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#2e7d32" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="index.html">ACCUEIL</a>
                <a href="connexion.html">CONNEXION</a>
            </nav>
        </div>
    </header>
    <div class="auth-page">
    <div class="login-card signup-card">
        <h1>INSCRIPTION</h1>
        <p style="font-size:0.9rem; color:#666;">Après inscription → <a href="index.html">accueil</a>. Déjà inscrit ? <a href="connexion.html">Connectez-vous</a>.</p>
        <p id="erreur-msg" style="color:#c62828; font-size:0.9rem; display:none;"></p>
        <form id="regForm" action="/inscription" method="POST">
            <input type="hidden" name="locAccepted" id="locAccepted" value="0">
            <input type="hidden" name="polAccepted" id="polAccepted" value="0">
            <input type="text" name="nom" placeholder="NOM" required autocomplete="family-name">
            <input type="text" name="prenom" placeholder="PRÉNOM" required autocomplete="given-name">
            <input type="email" name="email" id="email" placeholder="EMAIL" required autocomplete="email">
            <select name="age" id="age-select" required style="width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; height: 48px; background: white;">
                <option value="" disabled selected>VOTRE ÂGE (DÈS 14 ANS)</option>
            </select>
            <div class="password-group">
                <input type="password" id="pass1" name="password" placeholder="MOT DE PASSE (Min. 8 caractères)" required minlength="8" autocomplete="new-password">
                <button type="button" class="toggle-password" data-target="pass1"></button>
            </div>
            <div class="password-group">
                <input type="password" id="pass2" name="password_confirm" placeholder="CONFIRMER LE MOT DE PASSE" required autocomplete="new-password">
                <button type="button" class="toggle-password" data-target="pass2"></button>
            </div>

            <div class="options" style="text-align: left; margin: 10px 0; font-size: 0.9rem;">
                <label><input type="checkbox" name="remember"> Rester connecté</label>
                <label><input type="checkbox" id="loc"> Autoriser la localisation</label>
                <label>
                    <input type="checkbox" id="pol"> J'accepte la <a href="/politique">politique de confidentialité</a>
                </label>
            </div>

            <button type="submit">CRÉER MON COMPTE</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">
            Déjà inscrit ? <a href="connexion.html">Connectez-vous</a>
        </p>
        <a href="index.html" class="home-auth-btn" style="display:inline-block; margin-top:16px; text-decoration:none;">← RETOUR À L'ACCUEIL</a>
    </div>
    </div>

    <script>
        // Génération automatique des options d'âge (14 à 99 ans) pour éviter la saisie
        const ageSelect = document.getElementById('age-select');
        if (ageSelect) {
            for (let i = 14; i <= 99; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i + ' ans';
                ageSelect.appendChild(opt);
            }
        }

        // Gestion de la visibilité des mots de passe
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const isPass = target.type === 'password';
                target.type = isPass ? 'text' : 'password';
                this.classList.toggle('visible');
            });
        });

        const params = new URLSearchParams(window.location.search);
        const err = params.get('erreur');
        const msg = document.getElementById('erreur-msg');
        if (err === 'deja_inscrit') {
            msg.textContent = 'Cet email est déjà inscrit. Connectez-vous.';
            msg.style.display = 'block';
        }
        if (err === 'mdp') {
            msg.textContent = 'Les mots de passe ne correspondent pas.';
            msg.style.display = 'block';
        }
        if (err === 'consentement') {
            msg.textContent = 'Acceptez la localisation et la politique.';
            msg.style.display = 'block';
        }
        if (err === 'serveur') {
            msg.textContent = 'Erreur technique. Veuillez réessayer plus tard.';
            msg.style.display = 'block';
        }

        fetch('/session-status').then(r => r.json()).then(s => {
            if (s.loggedIn) window.location.href = 'index.html';
        });

        document.getElementById('regForm').onsubmit = function(e) {
            if (document.getElementById('pass1').value !== document.getElementById('pass2').value) {
                alert('Les mots de passe ne correspondent pas !');
                e.preventDefault();
                return;
            }
            if (!document.getElementById('loc').checked || !document.getElementById('pol').checked) {
                alert('Vous devez accepter la localisation et la politique !');
                e.preventDefault();
                return;
            }
            document.getElementById('locAccepted').value = '1';
            document.getElementById('polAccepted').value = '1';
        };
    </script>
</body>
</html>
