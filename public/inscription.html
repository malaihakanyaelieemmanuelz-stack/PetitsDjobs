<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Inscription - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a>
    </header>
    <nav class="nav-bar">
        <a href="index.html">ACCUEIL</a>
        <a href="connexion.html">CONNEXION</a>
    </nav>
    <div class="auth-page" style="padding: 30px 20px;">
    <div class="login-card" style="max-height: 90vh; overflow-y: auto;">
        <h1>INSCRIPTION</h1>
        <p style="font-size:0.9rem; color:#666;">Après inscription → <a href="index.html">accueil</a>. Déjà inscrit ? <a href="connexion.html">Connectez-vous</a>.</p>
        <p id="erreur-msg" style="color:#c62828; font-size:0.9rem; display:none;"></p>
        <form id="regForm" action="/inscription" method="POST">
            <input type="hidden" name="locAccepted" id="locAccepted" value="0">
            <input type="hidden" name="polAccepted" id="polAccepted" value="0">
            <input type="text" name="nom" placeholder="NOM" required autocomplete="family-name">
            <input type="text" name="prenom" placeholder="PRÉNOM" required autocomplete="given-name">
            <input type="email" name="email" id="email" placeholder="EMAIL" required autocomplete="email">
            <input type="text" name="date_naissance" placeholder="DATE DE NAISSANCE" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'" required autocomplete="bday">
            <div style="position: relative; display: flex; align-items: center; margin: 10px 0;">
                <input type="password" id="pass1" name="password" placeholder="MOT DE PASSE (Min. 8 caractères)" required minlength="8" style="padding-right: 40px; margin: 0; width: 100%" autocomplete="new-password">
                <button type="button" class="toggle-password" data-target="pass1" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #666; padding: 0; width: auto;">👁️</button>
            </div>
            <div style="position: relative; display: flex; align-items: center; margin: 10px 0;">
                <input type="password" id="pass2" name="password_confirm" placeholder="CONFIRMER LE MOT DE PASSE" required style="padding-right: 40px; margin: 0; width: 100%" autocomplete="new-password">
                <button type="button" class="toggle-password" data-target="pass2" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #666; padding: 0; width: auto;">👁️</button>
            </div>

            <div class="options" style="text-align: left; margin: 10px 0; font-size: 0.9rem;">
                <label><input type="checkbox" name="remember"> Rester connecté</label>
                <label><input type="checkbox" id="loc"> Autoriser la localisation</label>
                <label>
                    <input type="checkbox" id="pol"> J'accepte la <a href="/politique">politique de confidentialité</a>
                </label>
            </div>

            <button type="submit">CRÉER MON COMPTE</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">
            Déjà inscrit ? <a href="connexion.html">Connectez-vous</a>
        </p>
        <a href="index.html" class="home-auth-btn" style="display:inline-block; margin-top:16px; text-decoration:none;">← RETOUR À L'ACCUEIL</a>
    </div>
    </div>

    <script>
        // Gestion de la visibilité des mots de passe
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const type = target.type === 'password' ? 'text' : 'password';
                target.type = type;
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        const params = new URLSearchParams(window.location.search);
        const err = params.get('erreur');
        const msg = document.getElementById('erreur-msg');
        if (err === 'deja_inscrit') {
            msg.textContent = 'Cet email est déjà inscrit. Connectez-vous.';
            msg.style.display = 'block';
        }
        if (err === 'mdp') {
            msg.textContent = 'Les mots de passe ne correspondent pas.';
            msg.style.display = 'block';
        }
        if (err === 'consentement') {
            msg.textContent = 'Acceptez la localisation et la politique.';
            msg.style.display = 'block';
        }
        if (err === 'serveur') {
            msg.textContent = 'Erreur technique. Veuillez réessayer plus tard.';
            msg.style.display = 'block';
        }

        fetch('/session-status').then(r => r.json()).then(s => {
            if (s.loggedIn) window.location.href = 'index.html';
        });

        document.getElementById('regForm').onsubmit = function(e) {
            if (document.getElementById('pass1').value !== document.getElementById('pass2').value) {
                alert('Les mots de passe ne correspondent pas !');
                e.preventDefault();
                return;
            }
            if (!document.getElementById('loc').checked || !document.getElementById('pol').checked) {
                alert('Vous devez accepter la localisation et la politique !');
                e.preventDefault();
                return;
            }
            document.getElementById('locAccepted').value = '1';
            document.getElementById('polAccepted').value = '1';
        };
    </script>
</body>
</html>
