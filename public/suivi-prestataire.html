<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Navigation Prestataire - PetitsDjobs</title>
</head>
<body class="tracking-body">
    <div class="loader-gps" id="main-loader"></div>
    <div id="map"></div>

    <div class="floating-top-info" style="background: #5D4037; color: white;">
        <div id="navigation-hint" class="nav-hint-google">⬆️ Suivez l'itinéraire bleu</div>
        <h2 id="status-mission" style="font-size: 1.1rem; margin: 0; color: white;">TABLEAU DE BORD PRESTATAIRE</h2>
        <p id="mission-info" style="color:rgba(255,255,255,0.8); font-size: 0.75rem; margin: 3px 0 0; font-weight: bold;">Initialisation du GPS...</p>
        
        <div class="nav-actions-top">
            <button onclick="location.href='/chat.html?missionId='+missionId" class="btn-primary-sm btn-nav" style="background:#fff; color:#5D4037;">💬 CHAT</button>
            <div id="group-presta-arrive" style="display:none; width:100%; gap:8px;">
                <button onclick="marquerArrivee()" class="btn-primary-sm btn-nav" style="background:#2e7d32; flex:1;">JE SUIS ARRIVÉ</button>
            </div>

            <button id="btn-fini-tache" onclick="terminerTache()" class="btn-primary-sm btn-nav" style="display:none; background:#5D4037;">TÂCHE TERMINÉE</button>
            
            <div id="group-securite" style="display:none; width:100%; gap:8px;">
                <button onclick="repondreSecurite('safe')" class="btn-primary-sm btn-nav" style="background:#2e7d32; flex:1;">EN SÉCURITÉ</button>
            </div>

            <button id="btn-sos" onclick="declencherSOS()" class="btn-danger btn-nav" style="display:none;">🆘 SOS</button>
        </div>
    </div>

    <div class="floating-bottom-actions">
        <div id="gps-info" style="font-weight: 800; margin-bottom: 15px; color: #5D4037; font-size: 1.1rem;">Calcul de la distance...</div>
        <p style="font-size: 0.75rem; color: #b71c1c; text-align: center; margin-top: 8px; font-weight: bold;">⚠️ Toute fausse alerte (usage abusif) entraînera la suppression définitive de votre compte.</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        let map, markerMe, markerDest, routingControl, missionId;
        let clientPos = null;
        let lastDist = null;
        let aConfirmeSecurite = false;
        let hasCentered = false;

        function logDebug(msg) {
            console.log("[DEBUG SUIVI] " + msg);
            document.getElementById('mission-info').innerText = msg;
        }

        const iconMe = L.divIcon({ className: 'custom-icon', html: '<div style="background:#007bff; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.4);"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
        const iconDest = L.divIcon({ className: 'custom-icon', html: '<div style="background:#ff5252; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.4);"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });

        // Initialisation avec délai pour Android
        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });

        function init() {
            map = L.map('map', { zoomControl: false }).setView([0, 0], 15);
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);
            
            markerMe = L.marker([0, 0], { icon: iconMe }).addTo(map);
            markerDest = L.marker([0, 0], { icon: iconDest }).addTo(map);

            routingControl = L.Routing.control({
                waypoints: [],
                lineOptions: { 
                    styles: [
                        { color: 'white', opacity: 0.8, weight: 11 }, // Contour blanc pour le relief
                        { color: '#1a73e8', opacity: 1, weight: 7 }    // Bleu "Google Maps" vif
                    ] 
                },
                createMarker: () => null,
                addWaypoints: false,
                show: false,
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1/foot' }),
                routeWhileDragging: true // Permet de recalculer la route si les marqueurs sont déplacés (utile pour le debug)
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const routes = e.routes;
                const summary = routes[0].summary;
                const distM = summary.totalDistance; // Distance réelle à pied
                const label = distM < 1000 ? Math.round(distM) + " mètres" : (distM/1000).toFixed(2) + " km";
                document.getElementById('gps-info').innerHTML = `📍 Client à <strong>${label}</strong>`;
                verifierProximite(distM);
            });

            fetch('/get-session-commande').then(r => r.json()).then(cmd => {
                if (!cmd.missionId) {
                    logDebug("Erreur : ID Mission manquant dans la session.");
                    alert("Code Erreur: M1-NULL (Mission introuvable)");
                    return;
                }
                missionId = cmd.missionId;
                logDebug("Mission " + missionId + " chargée. Recherche GPS...");
                setInterval(pollClient, 3000);
                setInterval(checkStatus, 2000);
                startGPS(); // Lancer le GPS après avoir initialisé missionId
            }).catch(e => logDebug("Erreur chargement session: " + e.message));
        }

        let isUpdatingStatus = false;

        function startGPS() {
            const gpsOptions = {
                enableHighAccuracy: false, // Plus rapide pour l'initialisation sur Android
                maximumAge: 5000,
                timeout: 10000
            };

            navigator.geolocation.watchPosition(pos => {
                // On cache le loader dès qu'on a le premier signal
                document.getElementById('main-loader').style.display = 'none';

                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                logDebug(`GPS OK (±${Math.round(accuracy)}m)`);

                const newPos = [lat, lon];
                markerMe.setLatLng(newPos);
                
                // Suit le prestataire au fur et à mesure de son déplacement
                if (!hasCentered || map.getBounds().contains(newPos) === false) {
                    map.panTo(newPos);
                    if(!hasCentered) { map.setZoom(17); hasCentered = true; }
                }

                fetch('/sauvegarder-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon })
                });

                if (clientPos) updateNav(lat, lon);
            }, (err) => logDebug("Erreur GPS: " + err.message), gpsOptions);
        }

        function pollClient() {
            fetch('/api/suivi-client-gps?missionId=' + missionId).then(r => r.json()).then(pos => {
                if (pos.lat) {
                    logDebug("Position client reçue.");
                    clientPos = pos;
                    markerDest.setLatLng([pos.lat, pos.lon]);
                    updateNav(); // Appeler updateNav sans arguments
                } else {
                    logDebug("En attente de la position du client...");
                }
            });
        }

        async function updateNav() {
            const myPos = markerMe.getLatLng(); // Position actuelle du prestataire
            if (!clientPos || (myPos.lat === 0 && myPos.lng === 0) || (clientPos.lat === 0 && clientPos.lon === 0)) {
                logDebug("En attente des deux positions pour l'itinéraire...");
                return;
            }
            routingControl.setWaypoints([
                L.latLng(myPos.lat, myPos.lng), // Prestataire
                L.latLng(clientPos.lat, clientPos.lon) // Client
            ]);
        }

        async function verifierProximite(dist) {
            // Vérification automatique du statut pour la zone de sécurité
            const res = await fetch('/api/statut-mission?missionId=' + missionId);
            const data = await res.json();
            if (data.statut === 'en_route' && dist < 50 && (!lastDist || lastDist >= 50)) {
                document.getElementById('group-presta-arrive').style.display = 'flex';
            }
            // Zone de sécurité des 20 mètres pour paiement automatique
            if (data.statut === 'attente_securite' && dist > 20 && !aConfirmeSecurite) {
                aConfirmeSecurite = true;
                repondreSecurite('safe');
            }
            lastDist = dist;
        }

        async function checkStatus() {
            // Si on est en train de cliquer sur un bouton, on ne laisse pas le polling écraser l'affichage
            if (isUpdatingStatus) return;

            const res = await fetch('/api/statut-mission?missionId=' + missionId);
            const data = await res.json();
            if (data.statut === 'travail_en_cours') {
                document.getElementById('group-presta-arrive').style.display = 'none';
                document.getElementById('btn-fini-tache').style.display = 'block';
                document.getElementById('status-mission').innerText = "Travail en cours";
            } else if (data.statut === 'termine') {
                alert("Mission terminée !");
                window.location.href = '/index.html';
            }
        }

        async function marquerArrivee() {
            isUpdatingStatus = true;
            document.getElementById('group-presta-arrive').style.display = 'none';
            
            await fetch('/api/marquer-arrivee', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ missionId }) });
            
            setTimeout(() => {
                isUpdatingStatus = false;
                checkStatus();
            }, 1000);
        }

        async function terminerTache() {
            if (confirm("Confirmer la fin ?")) {
                await fetch('/api/terminer-tache', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ missionId }) });
            }
        }

        async function repondreSecurite(action) {
            const res = await fetch('/api/confirmer-securite', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId, action }) 
            });
            if (res.ok && action === 'safe') window.location.href = '/index.html';
        }

        async function declencherSOS() {
            if (confirm("🚨 SIGNALER UN DANGER IMMÉDIAT ?\n\nATTENTION : L'usage abusif de ce bouton sans danger réel est strictement interdit. Toute fausse alerte entraînera des sanctions immédiates pouvant aller jusqu'à la suppression définitive de votre compte.")) {
                const pos = markerMe.getLatLng();
                await fetch('/alerte-sos', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ lat: pos.lat, lon: pos.lng }) });
                alert("Alerte envoyée aux services de sécurité.");
            }
        }

        init();
    </script>
</body>
</html>
