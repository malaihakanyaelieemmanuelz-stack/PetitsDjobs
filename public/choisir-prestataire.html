<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Choisir Prestataire</title>
</head>
<body class="auth-page">
    <div style="max-width: 600px; margin: 30px auto; padding: 20px;">
        <h1 style="color:#5D4037;">Prestataires les plus proches</h1>
        <div id="compteur-total" style="background: #333; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; text-align: center;">
            Chargement de la communauté...
        </div>
        <p id="info-rayon" style="color:#666; font-size:0.9rem; font-weight: bold;">Recherche GPS active (incréments de 10m)...</p>
        <div id="liste-prestataires"></div>
        <button id="btn-plus" style="display:none; width:100%; padding:12px; margin-top:16px; background:#5D4037; color:white; border:none; border-radius:8px; cursor:pointer;">
            VOIR 20 PRESTATAIRES DE PLUS
        </button>
        <p stylne="text-align:center; margin-top:16px;"><a href="/commande">Retour commande</a></p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const service = params.get('service') || '';
        let offset = 0;
        let lat, lon;
        let rayonVirtuel = 0;
        let aTrouve = false;

        const container = document.getElementById('liste-prestataires');
        const info = document.getElementById('info-rayon');
        const btnPlus = document.getElementById('btn-plus');

        // Afficher le nombre total de prestataires inscrits
        fetch('/api/total-prestataires')
            .then(r => r.json())
            .then(data => {
                document.getElementById('compteur-total').innerText = `🚀 ${data.total} PRESTATAIRES PRÊTS À VOUS AIDER`;
            });

        function simulerRechercheExpansion() {
            if (aTrouve) return;
            rayonVirtuel += 10;
            info.innerText = `🔍 Recherche en cours... Rayon : ${rayonVirtuel} mètres`;
            
            // On continue de chercher tous les 500ms visuellement tant qu'on n'a pas de résultats
            if (rayonVirtuel < 50000) {
                setTimeout(simulerRechercheExpansion, 300);
            }
        }

        function afficherListe(items, append) {
            if (!append) container.innerHTML = '';
            if (!items.length && !append) {
                container.innerHTML = '<p>Aucun prestataire disponible pour ce service. Élargissement du rayon...</p>';
                return;
            }
            aTrouve = true;
            items.forEach(p => {
                const div = document.createElement('div');
                div.style.cssText = 'display:flex; align-items:center; gap:12px; padding:12px; margin:8px 0; background:#fff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.08);';
                div.innerHTML = `
                    <img src="${p.photo || ''}" width="56" height="56" style="border-radius:50%; object-fit:cover;">
                    <div style="flex:1;">
                        <strong>${p.nom}</strong> — ${p.profession || ''}<br>
                        <small>${p.distanceM} m · ⭐ ${p.etoiles || 0}</small>
                    </div>
                    <button type="button" data-id="${p.id}" class="btn-select" style="padding:8px 12px; background:#5D4037; color:#fff; border:none; border-radius:6px; cursor:pointer;">SÉLECTIONNER</button>
                `;
                container.appendChild(div);
                div.querySelector('.btn-select').onclick = () => selectionner(p.id);
            });
        }

        async function selectionner(id) {
            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prestataireId: id })
            });
            const data = await res.json();
            if (data.error) {
                alert(data.error);
                return;
            }
            window.location.href = '/commande';
        }

        async function charger(append) {
            const res = await fetch('/chercher-prestataires', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat, lon, service, offset })
            });
            const data = await res.json();
            if (data.error) {
                info.innerText = data.error;
                return;
            }
            info.innerText = `Rayon atteint : ~${data.rayonMetres} m · ${data.prestataires.length} affiché(s)`;
            afficherListe(data.prestataires, append);
            btnPlus.style.display = data.hasMore ? 'block' : 'none';
        }

        btnPlus.onclick = () => {
            offset += 20;
            charger(true);
        };

        navigator.geolocation.getCurrentPosition(
            async pos => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                simulerRechercheExpansion();
                await fetch('/sauvegarder-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon })
                });
                await charger(false);
            },
            () => {
                info.innerText = 'Activez le GPS pour voir les prestataires proches.';
                container.innerHTML = '<p>Localisation refusée.</p>';
            }
        );
    </script>
</body>
</html>
