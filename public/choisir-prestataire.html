<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Choisir un Prestataire - PetitsDjobs</title>
</head>
<body style="background-color: #f4f4f4;">
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; display:flex; align-items:center; gap:10px;">
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#FF6600"/>
                            <rect x="50" y="30" width="30" height="40" fill="#FF6600"/>
                            <path d="M15 50 L95 50" stroke="#2e7d32" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#2e7d32" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="javascript:history.back()" style="border: 2px solid #000; color: #000;">⬅️ RETOUR</a>
                <h1 id="titre-service" style="font-size: 1rem; color: #2e7d32; margin:0;">Recherche...</h1>
            </nav>
        </div>
    </header>

    <div class="app-wrap" style="padding: 20px;">
        <div id="status-recherche" style="text-align: center; margin-bottom: 20px;">
            <div class="loader-gps" id="loader" style="position: static; margin: 20px auto;"></div>
            <p id="info-rayon" style="color:#8B4513; font-weight: bold;">Localisation en cours...</p>
        </div>

        <div class="service-grid" id="liste-prestataires">
            <!-- Les cartes s'afficheront ici -->
        </div>

        <button id="btn-plus" style="display:none; width:100%; padding:12px; margin-top:16px; background:#5D4037; color:white; border:none; border-radius:8px; cursor:pointer;">
            VOIR 20 PRESTATAIRES DE PLUS
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const service = params.get('service') || '';
        const searchType = params.get('type') || 'service';
        const isBackupMode = params.get('mode') === 'backup';

        document.getElementById('titre-service').innerText = service || "Prestataires";

        let offset = 0;
        let userLat = null, userLon = null;
        let aTrouve = false;

        const container = document.getElementById('liste-prestataires');
        const info = document.getElementById('info-rayon');
        const btnPlus = document.getElementById('btn-plus');
        const loader = document.getElementById('loader');

        function distanceLabel(m) {
            if (m === Infinity || m == null) return 'Distance inconnue';
            if (m < 1000) return m + ' m';
            return (m / 1000).toFixed(1) + ' km';
        }

        function formatDerniereConnexion(dateStr, disponible) {
            return `<span style="color:${disponible ? '#2e7d32' : '#666'};">${dateStr}</span>`;
        }

        function createCard(p) {
            const nomComplet = [p.prenom, p.nom].filter(Boolean).join(' ');
            const statusTxt = formatDerniereConnexion(p.dernierAcces, p.disponible);
            
            return `
                <article class="profile-card" style="width:100%; max-width:320px; margin: 10px auto;" onclick="location.href='/voir-prestataire?id=${p.id}'">
                    <div class="card-header-banner"></div>
                    <div class="card-avatar-wrapper">
                        <img src="${p.photo || 'default-profile.png'}" alt="${nomComplet}" onerror="this.src='default-profile.png'">
                        <div class="card-status-dot ${p.disponible ? 'online' : 'offline'}"></div>
                    </div>
                    <div class="card-body-content">
                        <p style="font-size:0.7rem; color:#888; margin-bottom:5px;">${statusTxt}</p>
                        <h3>${nomComplet}</h3>
                        <p class="profession">${p.profession || '-'}</p>
                        <div class="stats-pill">
                            <span>⭐ ${p.etoiles || 0}</span>
                            <span>📍 ${distanceLabel(p.distanceM)}</span>
                        </div>
                        <button class="card-action-btn" onclick="event.stopPropagation(); location.href='/voir-prestataire?id=${p.id}'">
                            VOIR LE PROFIL
                        </button>
                    </div>
                </article>
            `;
        }

        async function charger(append = false) {
            if (!append) loader.style.display = 'block';
            
            const res = await fetch('/chercher-prestataires', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: userLat, lon: userLon, service, offset, type: searchType })
            });
            const data = await res.json();
            
            loader.style.display = 'none';
            if (!append) container.innerHTML = '';

            if (data.prestataires && data.prestataires.length > 0) {
                const label = searchType === 'nom' ? 'correspondant à' : 'trouvés pour';
                info.innerText = `${data.total} prestataires ${label} "${service}"`;
                data.prestataires.forEach(p => {
                    container.innerHTML += createCard(p);
                });
                btnPlus.style.display = data.hasMore ? 'block' : 'none';
            } else {
                info.innerText = "Aucun prestataire trouvé. Essayez un autre service.";
            }
        }

        async function selectionner(id) {
            const res = await fetch('/selectionner-prestataire', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prestataireId: id, 
                    serviceChoisi: service,
                    isBackup: isBackupMode 
                })
            });
            const data = await res.json();
            if (data.error) {
                alert(data.error);
                return;
            }
            window.location.href = '/commande';
        }

        btnPlus.onclick = () => {
            offset += 20;
            charger(true);
        };

        if (searchType === 'nom') {
            // Recherche par nom : Pas besoin de GPS
            charger();
        } else {
            // Recherche par service : Initialisation avec GPS
            navigator.geolocation.getCurrentPosition(
                async pos => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    charger();
                },
                () => {
                    info.innerText = 'GPS refusé. Affichage des meilleurs profils nationaux.';
                    charger();
                }
            );
        }
    </script>
</body>
</html>
