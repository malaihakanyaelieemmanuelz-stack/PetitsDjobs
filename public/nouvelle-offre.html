<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nouvelle Offre - PetitsDjobs</title>
    <style>
        body { background: #f4f4f4; padding-top: 20px; }
        .offer-container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .manager-header { text-align:center; color:#2e7d32; margin-bottom:20px; font-weight:900; }
        .status-banner { padding: 12px; border-radius: 10px; font-weight: 900; margin-bottom: 15px; text-align: center; text-transform: uppercase; font-size: 0.8rem; }
        .banner-primary { background: #e8f5e9; color: #2e7d32; border: 2px solid #2e7d32; }
        .banner-backup { background: #fff3e0; color: #e65100; border: 2px solid #e65100; }
        .info-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; margin-bottom: 25px; position:relative; }
        .net-gain { font-size: 2rem; color: #2e7d32; font-weight: 900; margin: 8px 0; }
        .timer-badge { background:#FF6600; color:white; padding:5px 12px; border-radius:20px; font-weight:bold; font-size:0.9rem; margin-bottom:15px; display:inline-block; }
        .action-btns { display: flex; gap: 12px; margin-top: 25px; }
        .btn-accept { flex: 2; background: #2e7d32; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .btn-refuse { flex: 1; background: #eee; color: #666; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="offer-container">
        <h2 class="manager-header">📋 GESTIONNAIRE DE TÂCHES</h2>
        <div id="container-taches">Chargement de vos tâches...</div>
        <p style="text-align: center; margin-top: 20px;"><a href="/index.html" style="color:#FF6600; font-weight: bold; text-decoration: none;">← Retour Accueil</a></p>
    </div>

    <script>
        async function chargerTaches() {
            const res = await fetch('/api/mes-missions-prestataire');
            const missions = await res.json();
            const container = document.getElementById('container-taches');

            if (!missions || missions.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:40px; color:#666;'>Aucune tâche en attente de réponse.</p>";
                return;
            }

            container.innerHTML = missions.map(m => {
                // On marque automatiquement comme "Vu" quand on liste sur cette page
                localStorage.setItem(`vue_mission_${m.id}`, 'true');
                fetch(`/api/marquer-mission-vue/${m.id}`, { method: 'POST' });

                const gain = m.montant_prestataire || Math.round(m.prix * 0.95);
                return `
                <div class="info-card" id="task-${m.id}">
                    <div class="status-banner ${m.estSecours ? 'banner-backup' : 'banner-primary'}">
                        ${m.estSecours ? '📢 Prestataire de secours' : '⚡ Prestataire Principal'}
                    </div>
                    <div class="timer-badge">⏳ <span class="timer-val" data-ms="${m.expireDansMs}">${Math.ceil(m.expireDansMs/1000)}</span>s</div>
                    <div style="font-size: 0.75rem; font-weight: 800; color: #888; text-transform:uppercase;">Service</div>
                    <h2 style="margin: 5px 0 15px; color: #333; font-size:1.4rem;">${m.service}</h2>
                    <div style="font-size: 0.75rem; font-weight: 800; color: #888; text-transform:uppercase;">Votre gain net</div>
                    <div class="net-gain">${gain} FCFA</div>
                    <div style="margin-top: 15px; font-weight: 700; color: #333;">Client : ${m.client.prenom} ${m.client.nom}</div>
                    <div class="action-btns">
                        <button class="btn-refuse" onclick="repondre(${m.id}, 'refuser')">REFUSER</button>
                        <button class="btn-accept" onclick="repondre(${m.id}, 'accepter')">ACCEPTER</button>
                    </div>
                </div>
                `;
            }).join('');
            startCountdown();
        }

        function startCountdown() {
            setInterval(() => {
                document.querySelectorAll('.timer-val').forEach(span => {
                    let ms = parseInt(span.dataset.ms) - 1000;
                    span.dataset.ms = ms;
                    const secs = Math.max(0, Math.ceil(ms / 1000));
                    span.innerText = secs;
                    if (secs <= 0) span.closest('.info-card').remove();
                });
            }, 1000);
        }

        async function repondre(id, action) {
            const res = await fetch('/api/repondre-mission', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ missionId: id, action })
            });
            if (res.ok) {
                if (action === 'accepter') {
                    location.href = `/suivi?missionId=${id}`;
                } else {
                    location.reload();
                }
            }
        }
        chargerTaches();
    </script>
</body>
</html>
