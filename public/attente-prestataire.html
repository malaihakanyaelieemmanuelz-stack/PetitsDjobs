<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>En attente du prestataire - PETITSDJOBS</title>
</head>
<body class="auth-page" style="background: #f4f4f4;">
    <div class="login-card" style="max-width: 450px; border-top: none; padding: 30px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="pulse-avatar">
                <img id="wait-photo" src="default-profile.png" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); object-fit: cover;">
            </div>
            <h1 style="font-size: 1.4rem; color: #333; margin-top: 20px; text-transform: none;">Demande envoyée à <span id="wait-prenom">...</span></h1>
        </div>

        <div style="background: #fff8f1; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ffe0b2;">
            <p style="margin: 0; font-size: 0.9rem; color: #5D4037;">
                🚀 <strong>Service :</strong> <span id="wait-service">Chargement...</span><br>
                📍 Le prestataire vérifie sa disponibilité.
            </p>
        </div>

        <div class="progress-container">
            <div id="pbar" class="progress-bar-fill"></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span style="font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold;">Temps restant</span>
            <div class="countdown" id="timer" style="margin:0; font-size: 1.8rem; font-weight: 900; color: #5D4037;">60</div>
        </div>

        <!-- Zone de conseils de sécurité pour meubler l'attente -->
        <div id="tips-box" style="min-height: 80px; padding: 15px; background: #f9f9f9; border-radius: 10px; font-size: 0.85rem; color: #666; border-left: 3px solid #5D4037;">
            <i id="tip-text">Conseil : Vérifiez toujours le profil du prestataire avant son arrivée.</i>
        </div>

        <button onclick="if(confirm('Annuler la recherche ?')) window.location.href='/choisir-prestataire'" class="btn-outline" style="width: 100%; margin-top: 30px; border-color: #eee; color: #999; font-size: 0.9rem; min-height: 45px;">ANNULER LA DEMANDE</button>
    </div>

    <script>
        let timeLeft = 60;
        const timerEl = document.getElementById('timer');
        const pbar = document.getElementById('pbar');
        const tips = [
            "Conseil : Ne payez jamais en dehors de l'application pour votre sécurité.",
            "Le saviez-vous ? Nos prestataires sont notés par la communauté.",
            "Vérifiez que vous avez bien activé votre GPS pour un suivi précis.",
            "Un imprévu ? Vous pourrez discuter avec le prestataire dès qu'il accepte.",
            "Sécurité : Un code de validation vous sera demandé à la fin du service."
        ];
        let tipIndex = 0;

        // Changer le texte de conseil toutes les 10 secondes
        setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            const tipEl = document.getElementById('tip-text');
            tipEl.style.opacity = 0;
            setTimeout(() => {
                tipEl.innerText = tips[tipIndex];
                tipEl.style.opacity = 1;
            }, 500);
        }, 10000);

        // Charger les infos du prestataire pour la session
        fetch('/get-session-commande').then(r => r.json()).then(cmd => {
            if (cmd.missionId) {
                missionId = cmd.missionId;
                document.getElementById('wait-prenom').innerText = cmd.prestatairePrenom || 'votre prestataire';
                document.getElementById('wait-service').innerText = cmd.service || 'Service';
                if (cmd.prestatairePhoto) document.getElementById('wait-photo').src = cmd.prestatairePhoto;
            }
        });

        const countdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            pbar.style.width = (timeLeft / 60 * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                clearInterval(poll);
                alert("Le prestataire n'a pas répondu. Veuillez en choisir un autre.");
                window.location.href = '/choisir-prestataire';
            }
        }, 1000);

        const poll = setInterval(async () => {
            if (!missionId) return;

            // On passe explicitement le missionId pour éviter les problèmes de session
            const res = await fetch('/api/statut-mission?missionId=' + missionId);
            const data = await res.json();
            
            if (data.statut === 'en_route') {
                clearInterval(countdown);
                clearInterval(poll);
                window.location.href = '/suivi';
            } else if (data.statut === 'refuse' || data.statut === 'annule_faute_de_prestataire') {
                // Si le prestataire refuse ou si le système annule faute de réponse
                clearInterval(countdown);
                clearInterval(poll);
                
                const msg = data.statut === 'refuse' ? "Le prestataire a refusé votre offre, recherchez un autre prestataire stp." : "Le délai est expiré et aucun prestataire n'est disponible.";
                alert(msg + " Vous allez être redirigé vers la recherche.");
                window.location.href = '/choisir-prestataire';
            }
        }, 2000); // Polling toutes les 2 secondes
    </script>
</body>
</html>
