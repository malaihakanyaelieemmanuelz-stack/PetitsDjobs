<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Commander - PETITSDJOBS</title>
    <style>
        .header-logo { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #5D4037; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; border-bottom: 2px solid #5D4037; padding-bottom: 10px; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; margin: 20px auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #5D4037; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
    </style>
</head>
<body style="background-color: #f4f4f4; font-family: sans-serif;">

    <div class="login-card">
        <div class="header-logo">PETITSDJOBS</div>
        <h1>COMMANDER</h1>
        
        <form id="orderForm" action="/commander" method="POST">
            <input type="text" name="service" placeholder="Nom du service (ex: Cuisine)" required>
            <input type="number" name="prixService" placeholder="Prix du service (FCFA)" required>
            
            <label>Rayon de recherche :</label>
            <select name="rayon">
                <option value="500">500 mètres</option>
                <option value="1000">1 km</option>
                <option value="2000">2 km</option>
            </select>
