<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%238B4513'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%238B4513'/%3E%3Cpath d='M15 50 L95 50' stroke='%23000000' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%23000000' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Ma carte de visite</title>
</head>
<body>
    <!-- Son de notification -->
    <audio id="notif-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none;">
                <h1>
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#8B4513"/>
                            <rect x="50" y="30" width="30" height="40" fill="#8B4513"/>
                            <path d="M15 50 L95 50" stroke="#000000" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#000000" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    MA CARTE
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="/profil">PROFIL</a>
                <a href="index.html">ACCUEIL</a>
            </nav>
        </div>
    </header>

    <div class="app-wrap profile-full-screen">
        <p id="msg-ok" style="display:none; text-align:center; color:#2e7d32; padding:12px; background:#e8f5e9; margin:0;">
            ✓ Votre carte de visite est en ligne.
        </p>

        <div id="zone-missions" style="display:none; padding: 0 20px;">
            <h3 style="color:#b71c1c; margin-bottom:10px;">🔔 NOUVELLES DEMANDES</h3>
            <div id="liste-missions-attente"></div>
        </div>

        <div class="trust-card" id="ma-carte" style="box-shadow:none; margin:0; width:100%;">
            <p style="padding:40px;">Chargement...</p>
        </div>

        <div style="padding: 20px;">
            <button onclick="location.href='/prestataire?modifier=1'" class="btn-outline" style="width:100%; text-align:center; margin-bottom:10px;">
                Modifier ma fiche
            </button>
            <button onclick="location.href='/profil'" class="btn-primary-sm" style="width:100%; padding:12px;">
                Retour profil
            </button>

            <div style="margin-top: 30px; padding: 15px; background: #fff5f5; border-radius: 12px; border: 1px solid #ffcdd2; text-align: center;">
                <p style="font-size: 0.85rem; color: #666; margin-bottom: 10px;">Vous ne souhaitez plus être prestataire ?</p>
                <button onclick="supprimerMaCarte()" class="btn-danger" style="width:100%; margin-bottom: 8px;">Supprimer ma carte de visite</button>
                <button onclick="supprimerCompte()" style="background:none; border:none; color:#c62828; font-size:0.8rem; cursor:pointer; text-decoration:underline;">Supprimer définitivement mon compte</button>
            </div>
        </div>
    </div>

    <script>
        if (new URLSearchParams(location.search).get('inscription') === 'ok') {
            document.getElementById('msg-ok').style.display = 'block';
        }

        fetch('/get-user-data').then(r => r.json()).then(data => {
            if (!data.isPrestataire) {
                window.location.href = '/prestataire';
                return;
            }
            const nom = [data.prenom, data.nom].filter(Boolean).join(' ');
            const avis = (data.commentaires || []).length
                ? (data.commentaires || []).map(c => '<li>' + (typeof c === 'string' ? c : c.texte) + '</li>').join('')
                : '<li>Vos futurs clients pourront laisser un avis ici.</li>';

            document.getElementById('ma-carte').innerHTML = `
                <div class="trust-card-header">
                    <img src="${data.photo || ''}" alt="Votre photo">
                    <h2 style="margin:0;">${nom}</h2>
                    <p style="margin:8px 0 0;">⭐ ${data.etoiles ?? 0} / 5 · Profil Confiance</p>
                </div>
                <div class="trust-card-body">
                    <p><strong>Âge :</strong> ${data.age || '-'}</p>
                    <p><strong>Ville :</strong> ${data.ville || '-'}</p>
                    <p><strong>Profession :</strong> ${data.profession || '-'}</p>
                    <p><strong>Je propose :</strong> ${data.services || '-'}</p>
                    <p style="font-style:italic;">"${data.bio || 'Ajoutez une courte présentation dans Modifier ma fiche.'}"</p>
                    <h3>Commentaires</h3>
                    <ul style="padding-left:20px;">${avis}</ul>
                    <p style="font-size:0.85rem; color:#888; margin-top:16px;">
                        Votre pièce d'identité reste privée — seuls votre visage et votre réputation sont visibles.
                    </p>
                </div>`;
            
            verifierMissions();
            // Vérifier les nouvelles missions toutes les 2 secondes
            setInterval(verifierMissions, 2000);
        });

        let lastCount = 0;
        async function verifierMissions() {
            const res = await fetch('/api/mes-missions-prestataire');
            const missions = await res.json();
            console.log("[DEBUG CLIENT] Missions reçues:", missions); // Pour voir dans F12 si des données arrivent
            
            const zone = document.getElementById('zone-missions');
            const liste = document.getElementById('liste-missions-attente');
            
            if (missions.length > 0) {
                if (missions.length > lastCount) {
                    document.getElementById('notif-sound').play().catch(e => {});
                }
                zone.style.display = 'block';
                liste.innerHTML = missions.map(m => `
                    <div class="checkout-card" style="margin-bottom:10px;">
                        <strong>Client :</strong> ${m.client ? m.client.prenom + ' ' + m.client.nom : 'Inconnu'}<br>
                        <strong>Service :</strong> ${m.service}<br>
                        <strong>Somme :</strong> ${m.prix} FCFA<br>
                        <p style="color:#b71c1c; font-weight:bold; font-size:0.85rem; margin:8px 0;">⏳ RÉPONDEZ VITE : Moins d'une minute restante !</p>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="repondreMission(${m.id}, 'accepter')" style="flex:1; background:#2e7d32; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer;">ACCEPTER</button>
                            <button onclick="repondreMission(${m.id}, 'refuser')" style="flex:1; background:#333; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer;">REFUSER</button>
                        </div>
                    </div>
                `).join('');
            } else {
                zone.style.display = 'none';
            }
            lastCount = missions.length;
        }

        async function repondreMission(id, action) {
            const res = await fetch('/api/repondre-mission', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ missionId: id, action })
            });
            if (res.ok) {
                if (action === 'accepter') {
                    await fetch('/preparer-commande', {
                       method: 'POST',
                       headers: {'Content-Type': 'application/json'},
                       body: JSON.stringify({ missionId: id })
                    });
                    window.location.href = '/suivi';
                } else {
                    verifierMissions();
                }
            }
        }
        async function supprimerMaCarte() {
            if (confirm("Voulez-vous supprimer votre carte de visite ? Vous ne serez plus visible comme prestataire mais vous garderez votre compte client.")) {
                const res = await fetch('/supprimer-profil-prestataire', { method: 'POST' });
                const data = await res.json();
                if (res.ok) { alert(data.message); window.location.href = '/profil'; }
                else alert(data.error);
            }
        }

        async function supprimerCompte() {
            if (confirm("⚠️ ACTION IRRÉVERSIBLE : Voulez-vous supprimer votre compte entier (Client + Prestataire) ?")) {
                const res = await fetch('/supprimer-compte', { method: 'POST' });
                if (res.ok) {
                    alert("Compte supprimé.");
                    window.location.href = '/index.html';
                }
            }
        }
    </script>
</body>
</html>
