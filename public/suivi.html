<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <title>Suivi GPS & Sécurité</title>
</head>
<body class="tracking-body">
    <!-- Système de Chat Intégré au Suivi -->
    <div id="chat-panel" style="display:none; position:fixed; bottom:0; left:0; right:0; top:20%; background:white; z-index:2000; flex-direction:column; border-radius:25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); transition: transform 0.3s ease;">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; background:#fdfaf9; border-radius:25px 25px 0 0;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:10px; height:10px; background:#2e7d32; border-radius:50%;"></div>
                <strong style="color:#FF6600;">DISCUSSION DIRECTE</strong>
            </div>
            <button onclick="toggleChat(false)" style="background:#eee; border:none; width:35px; height:35px; border-radius:50%; font-weight:bold; cursor:pointer;">✕</button>
        </div>
        <div id="chat-messages-list" class="chat-container" style="flex:1; overflow-y:auto; padding:20px; background:#f9f9f9;">
            <!-- Les messages s'affichent ici -->
        </div>
        <div style="padding:15px 15px 30px; display:flex; gap:10px; background:white; border-top:1px solid #eee;">
            <input type="text" id="chat-input-text" placeholder="Écrivez ici..." style="flex:1; padding:15px; border-radius:30px; border:2px solid #f0f0f0; outline:none; font-size:1rem;">
            <button onclick="envoyerMessageSuivi()" style="background:#FF6600; color:white; border:none; border-radius:50%; width:55px; height:55px; font-size:1.2rem; cursor:pointer; box-shadow:0 4px 10px rgba(255,102,0,0.3);">➔</button>
        </div>
    </div>

    <!-- Bouton Flottant Chat -->
    <button id="btn-chat-float" onclick="toggleChat(true)" style="position:fixed; bottom:120px; right:20px; width:65px; height:65px; border-radius:50%; background:#2e7d32; color:white; border:none; box-shadow: 0 6px 20px rgba(0,0,0,0.3); z-index:1002; display:flex; align-items:center; justify-content:center; font-size:1.8rem; cursor:pointer; transition: transform 0.2s;">
        💬
        <span id="unread-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#FF6600; color:white; border-radius:50%; width:24px; height:24px; font-size:0.75rem; font-weight:bold; border:2px solid white; display:flex; align-items:center; justify-content:center;">0</span>
    </button>

    <!-- Carte en arrière-plan complet -->
    <div id="map"></div>

    <!-- Overlay du haut : Statut et Navigation -->
    <div class="floating-top-info">
        <div style="display: flex; align-items: center; gap: 12px;">
            <!-- Photo de l'utilisateur (cliquable pour modifier) -->
            <img id="my-photo-suivi" src="default-profile.png" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid white; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" onclick="document.getElementById('input-photo-suivi').click()" title="Modifier ma photo">
            
            <div style="flex: 1;">
                <div id="navigation-hint" class="nav-hint-google" style="display:none;">
                    ⬆️ Suivez l'itinéraire bleu
                </div>
                <h2 id="status-mission" style="font-size: 1.1rem; margin: 0; color: #333;">Vérification...</h2>
                <p id="mission-info" style="color:#666; font-size: 0.85rem; margin: 3px 0 0;">Veuillez patienter</p>
            </div>
            <!-- Photo du partenaire (prestataire ou client) -->
            <img id="partner-photo-suivi" src="default-profile.png" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #FF6600; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        </div>
        <input type="file" id="input-photo-suivi" style="display:none;" accept="image/*" onchange="uploadPhotoSuivi(this)">
    </div>

    <!-- Overlay du bas : Actions et Distance -->
    <div class="floating-bottom-actions">
        <div id="gps-info" style="font-weight: bold; margin-bottom: 15px; color: #2e7d32; font-size: 1rem;">
            Initialisation du GPS...
        </div>

        <!-- Boutons Client -->
        <button id="btn-client-arrive" onclick="clientMarquerArrivee()" class="btn-primary-sm" style="display:none; background:#2e7d32; width:100%; margin-bottom:10px; height:50px;">
            L'INTERVENANT EST ARRIVÉ
        </button>
        <button id="btn-client-sos" onclick="declencherSOS()" class="btn-danger" style="display:none; background:#FF6600; width:100%; height:50px;">
            🆘 SIGNALER UN DANGER
        </button>
        <button id="btn-client-depart" onclick="clientConfirmerDepart()" class="btn-primary-sm" style="display:none; background:#FF6600; width:100%; height:50px;">
            VALIDER LE DÉPART
        </button>
        <button id="btn-client-confirm-fin" onclick="clientConfirmerFinTravail()" class="btn-primary-sm" style="display:none; background:#2e7d32; width:100%; margin-bottom:10px; height:50px;">
            ✅ CONFIRMER FIN DU TRAVAIL (PAIEMENT)
        </button>

        <!-- Boutons Prestataire -->
        <div id="group-presta-arrive" style="display:none; gap:10px; margin-bottom:10px;">
            <button onclick="marquerArrivee()" class="btn-primary-sm" style="flex:2; background:#2e7d32; height:50px;">JE SUIS ARRIVÉ</button>
            <button onclick="alert('L\'itinéraire continue vers le point rouge.')" class="btn-primary-sm" style="flex:1; background:#FF6600; height:50px;">NON</button>
        </div>
        <button id="btn-fini-tache" onclick="terminerTache()" class="btn-primary-sm" style="display:none; background:#2e7d32; width:100%; height:50px;">
            MARQUER TÂCHE TERMINÉE
        </button>
        <button id="btn-sos" onclick="declencherSOS()" class="btn-danger" style="display:none; background:#FF6600; width:100%; height:50px;">
            🆘 APPEL D'URGENCE
        </button>
        <p id="sos-warning" style="display:none; font-size: 0.75rem; color: #FF6600; text-align: center; margin-top: 8px; font-weight: bold;">⚠️ Toute fausse alerte entraînera la suppression définitive de votre compte.</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        let map, markerProvider, markerClient, routingControl;
        let isProvider = false;
        let missionId = null;
        let lastLat = null;
        let lastLon = null;
        let clientPos = null;
        let aAlerteSecurite = false;
        let dernierMessageDistance = null;

        const providerIcon = L.divIcon({
            className: 'custom-icon',
            html: '<div style="background:#2e7d32; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });
        const clientIcon = L.divIcon({
            className: 'custom-icon',
            html: '<div style="background:#FF6600; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Initialisation de la carte (vue par défaut sur une position neutre)
        function initMap() {
            map = L.map('map').setView([0, 0], 13);
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);
            
            markerProvider = L.marker([0, 0], { icon: providerIcon }).addTo(map);
            markerClient = L.marker([0, 0], { icon: clientIcon }).addTo(map);

            // Initialisation du moteur d'itinéraire (Navigation style Yango)
            routingControl = L.Routing.control({
                waypoints: [],
                lineOptions: {
                    styles: [{ color: '#2e7d32', opacity: 0.8, weight: 6, dashArray: '10, 10' }]
                },
                createMarker: function() { return null; }, // On utilise nos propres curseurs
                addWaypoints: false,
                draggableWaypoints: false,
                show: false, // Cache le panneau texte des directions pour garder la carte grande
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1'
                })
            }).addTo(map);

            // Capture des instructions de navigation pour guider le prestataire
            routingControl.on('routesfound', function(e) {
                const routes = e.routes;

                // Ajout de la flèche dirigée vers le client (fin de la ligne)
                if (window.arrowDecorator) map.removeLayer(window.arrowDecorator);
                window.arrowDecorator = L.polylineDecorator(routes[0].coordinates, {
                    patterns: [
                        {offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({pixelSize: 15, polygon: false, pathOptions: {stroke: true, color: '#2e7d32', weight: 4}})}
                    ]
                }).addTo(map);

                const summary = routes[0].summary;
                const instructions = routes[0].instructions;
                if (instructions && instructions.length > 0 && isProvider) {
                    // On affiche l'instruction la plus pertinente (la prochaine étape)
                    const nextStep = instructions[1] || instructions[0];
                    document.getElementById('navigation-hint').innerHTML = `<b>Guidage :</b> ${nextStep.text} <br> <small>Distance restante : ${Math.round(summary.totalDistance)} mètres</small>`;
                    document.getElementById('navigation-hint').style.display = 'block';
                }
            });
        }

        initMap();

        // Vérifier qui est l'utilisateur (Prestataire ou Client)
        async function identifierRole() {
            try {
                console.log("[DEBUG SUIVI] Début identification...");
                const rUser = await fetch('/get-user-data');
                const user = await rUser.json();
                if (user.photo) document.getElementById('my-photo-suivi').src = user.photo;

                const rCmd = await fetch('/get-session-commande');
                const cmd = await rCmd.json();
                
                console.log("[DEBUG SUIVI] Session récupérée:", cmd);
                
                if (!cmd.missionId) {
                    console.error("[DEBUG SUIVI] Pas de missionId dans la session !");
                    document.getElementById('status-mission').innerText = "Erreur: Mission introuvable";
                    return;
                }

                missionId = cmd.missionId;

                // Affichage de la photo du prestataire (si on est client)
                if (!user.isPrestataire && cmd.prestatairePhoto) document.getElementById('partner-photo-suivi').src = cmd.prestatairePhoto;

                if (user.id === cmd.prestataireId) {
                    console.log("[DEBUG SUIVI] Rôle détecté: PRESTATAIRE");
                    isProvider = true;
                    demarrerSuiviGPS();
                    document.getElementById('btn-sos').style.display = 'block';
                    document.getElementById('sos-warning').style.display = 'block';
                    demarrerPollingClientGPS();
                } else {
                    console.log("[DEBUG SUIVI] Rôle détecté: CLIENT");
                    demarrerSuiviGPS(); // Le client suit aussi son GPS pour les alertes SOS
                    const resStat = await fetch('/api/statut-mission?missionId=' + missionId);
                    const statData = await resStat.json();
                    
                    if (statData.statut === 'en_route' || statData.statut === 'travail_en_cours' || statData.statut === 'attente_securite') {
                        document.getElementById('status-mission').innerText = "Suivi en cours...";
                        demarrerPollingPrestataireGPS();
                    } else {
                        console.warn("[DEBUG SUIVI] Statut non éligible au suivi:", statData.statut);
                        window.location.href = '/attente-prestataire';
                    }
                }
            } catch (err) {
                console.error("[DEBUG SUIVI] Erreur lors de l'initialisation:", err);
            }
        }

        identifierRole();

        // --- LOGIQUE DE CHAT ET NOTIFICATIONS ---
        async function rafraichirMessages() {
            if (!missionId) return;
            const res = await fetch(`/api/get-messages/${missionId}`);
            const messages = await res.json();
            
            const container = document.getElementById('chat-messages-list');
            const currentUserId = (await (await fetch('/get-user-data')).json()).id;

            // Vérifier s'il y a de nouveaux messages pour la notification
            if (messages.length > 0) {
                const dernierMsg = messages[messages.length - 1];
                if (dernierMsg.id > lastMessageId) {
                    if (!isChatOpen && dernierMsg.sender_id !== currentUserId) {
                        unreadCount++;
                        document.getElementById('unread-badge').innerText = unreadCount;
                        document.getElementById('unread-badge').style.display = 'flex';
                        // Petite vibration ou son si dispo
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                    lastMessageId = dernierMsg.id;
                }
            }

            if (isChatOpen) {
                container.innerHTML = messages.map(m => {
                    const isMe = m.sender_id === currentUserId;
                    const status = m.lu ? '<span style="color:#2e7d32; font-size:0.7rem; font-weight:bold;">👀 Vu</span>' : '<span style="color:#999; font-size:0.7rem;">✓ Reçu</span>';
                    return `
                        <div class="message-bubble ${isMe ? 'me ' + (isProvider ? 'presta-style' : 'client-style') : 'other ' + (isProvider ? 'client-style' : 'presta-style')}">
                            ${m.text}
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; gap:10px;">
                                <span class="message-time">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                ${isMe ? status : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
                marquerMessagesLus();
            }
        }

        async function envoyerMessageSuivi() {
            const input = document.getElementById('chat-input-text');
            const text = input.value.trim();
            if (!text) return;
            
            await fetch('/api/send-message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ missionId, text })
            });
            input.value = '';
            rafraichirMessages();
        }

        async function marquerMessagesLus() {
            if (!isChatOpen) return;
            await fetch('/api/mark-messages-read', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ missionId })
            });
        }

        setInterval(rafraichirMessages, 3000);

        async function rafraichirStatut() {
            const res = await fetch('/api/statut-mission?missionId=' + missionId);
            const data = await res.json();

            const groupArriveP = document.getElementById('group-presta-arrive');
            const btnFiniP = document.getElementById('btn-fini-tache');
            const btnSosP = document.getElementById('btn-sos');
            const navHint = document.getElementById('navigation-hint');

            const btnArriveC = document.getElementById('btn-client-arrive');
            const btnSosC = document.getElementById('btn-client-sos');
            const btnDepartC = document.getElementById('btn-client-depart');
            const btnConfirmFinC = document.getElementById('btn-client-confirm-fin');

            if (isProvider) {
                if (data.statut === 'en_route') {
                    document.getElementById('status-mission').innerText = "Êtes-vous arrivé ?";
                    navHint.style.display = 'block';
                } else if (data.statut === 'travail_en_cours') {
                    groupArriveP.style.display = 'none';
                    btnFiniP.style.display = 'block';
                    btnSosP.style.display = 'block';
                    navHint.style.display = 'none';
                    document.getElementById('status-mission').innerText = "Travail en cours";
                } else if (data.statut === 'attente_confirmation_client') {
                    btnFiniP.style.display = 'none';
                    document.getElementById('status-mission').innerText = "En attente de confirmation client pour le paiement";
                } else if (data.statut === 'attente_securite') {
                    btnFiniP.style.display = 'none';
                    document.getElementById('status-mission').innerText = "Tâche finie - Éloignez-vous";
                } else if (data.statut === 'termine') {
                    alert("Mission terminée avec succès. Votre paiement a été débloqué (après commission 5 %).");
                    window.location.href = '/index.html';
                }
            } else {
                if (data.statut === 'en_route') {
                    document.getElementById('status-mission').innerText = "Le prestataire arrive...";
                    btnArriveC.style.display = 'block';
                    btnSosC.style.display = 'none';
                    btnDepartC.style.display = 'none';
                } else if (data.statut === 'travail_en_cours') {
                    btnArriveC.style.display = 'none';
                    btnSosC.style.display = 'block';
                    btnDepartC.style.display = 'none';
                } else if (data.statut === 'attente_confirmation_client') {
                    btnArriveC.style.display = 'none';
                    btnSosC.style.display = 'none';
                    btnDepartC.style.display = 'none';
                    btnConfirmFinC.style.display = 'block';
                    document.getElementById('status-mission').innerText = "Le prestataire a terminé — confirmez pour payer";
                } else if (data.statut === 'attente_securite') {
                    btnArriveC.style.display = 'none';
                    btnSosC.style.display = 'none';
                    btnDepartC.style.display = 'block';
                    btnConfirmFinC.style.display = 'none';
                } else if (data.statut === 'termine') {
                    alert("Mission terminée. Merci d'avoir utilisé PetitsDjobs !");
                    window.location.href = '/index.html';
                }
            }
        }
        setInterval(rafraichirStatut, 2000);

        function verifierDistance(lat, lon) {
            if (!clientPos) return;
            const pCoord = L.latLng(lat, lon);
            const cCoord = L.latLng(clientPos.lat, clientPos.lon);
            const dist = pCoord.distanceTo(cCoord);
            
            // Mise à jour de l'itinéraire sur la route (Navigation)
            routingControl.setWaypoints([pCoord, cCoord]);

            const distArrondie = Math.round(dist);
            console.log(`[DEBUG SUIVI] Distance: ${distArrondie} mètres`);
            
            // Mise à jour de l'affichage de distance
            const label = dist < 1000 ? Math.round(dist) + " m" : (dist/1000).toFixed(2) + " km";
            document.getElementById('gps-info').innerHTML = isProvider ? 
                `📍 Distance du client : <strong>${label}</strong>` : 
                `🛵 Le prestataire est à <strong>${label}</strong> de vous.`;

            // Guidance vocale selon la distance (tous les 500m ou à l'arrivée)

            fetch('/api/statut-mission?missionId=' + missionId).then(r => r.json()).then(data => {
                if (data.statut === 'en_route' && dist < 50) {
                    if (isProvider) document.getElementById('group-presta-arrive').style.display = 'flex';
                }
                
                if (data.statut === 'attente_securite' && dist > 15 && !aAlerteSecurite) {
                    aAlerteSecurite = true;
                    document.getElementById('modal-securite').style.display = 'flex';
                }
            });
        }

        async function uploadPhotoSuivi(input) {
            if (!input.files || !input.files[0]) return;
            const formData = new FormData();
            formData.append('photo', input.files[0]);
            
            const res = await fetch('/api/update-profile-photo', {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('my-photo-suivi').src = data.url;
                alert("Photo mise à jour !");
            }
        }

        // Charger les infos de la mission
        fetch('/get-session-commande')
            .then(r => r.json())
            .then(cmd => {
                if (cmd.prestataireNom) {
                    const nom = [cmd.prestatairePrenom, cmd.prestataireNom].filter(Boolean).join(' ');
                    document.getElementById('status-mission').innerText = `Mission avec ${nom}`;
                    document.querySelector('.checkout-card p').innerText = `Service : ${cmd.service} (${cmd.total} FCFA payés)`;
                }
            });

        async function clientMarquerArrivee() {
            const res = await fetch('/api/marquer-arrivee', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
            if (res.ok) rafraichirStatut();
        }

        async function clientConfirmerDepart() {
            const res = await fetch('/api/confirmer-depart', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId }) 
            });
            if (res.ok) window.location.href = '/index.html';
        }

        async function marquerArrivee() {
            await fetch('/api/marquer-arrivee', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ missionId }) });
        }

        async function terminerTache() {
            if (confirm("Confirmez-vous avoir terminé le service ? Le client devra valider pour déclencher le paiement.")) {
                const res = await fetch('/api/terminer-tache', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ missionId }) });
                const data = await res.json();
                alert(data.message || 'Demande envoyée au client.');
                rafraichirStatut();
            }
        }

        async function clientConfirmerFinTravail() {
            const res = await fetch('/api/confirmer-fin-travail', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ missionId })
            });
            const data = await res.json();
            if (res.ok && data.ok) {
                alert('Paiement validé. Merci !');
                window.location.href = '/index.html';
            } else {
                alert(data.message || data.error || 'Confirmation impossible pour le moment.');
            }
        }

        async function repondreSecurite(action) {
            const res = await fetch('/api/confirmer-securite', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ missionId, action }) 
            });
            const data = await res.json();
            if (action === 'safe') {
                alert("Paiement validé. Merci pour votre professionnalisme.");
                window.location.href = '/index.html';
            } else {
                alert("ALERTE ENVOYÉE. La police et nos services de sécurité ont été prévenus de votre position.");
                document.getElementById('modal-securite').style.display = 'none';
            }
        }

        async function declencherSOS() {
            if (confirm("🚨 SIGNALER UN DANGER IMMÉDIAT ?\n\nATTENTION : L'usage abusif de ce bouton sans danger réel entraînera des sanctions immédiates allant jusqu'à la suppression de votre compte.")) {
                const res = await fetch('/alerte-sos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        lat: lastLat, 
                        lon: lastLon 
                    })
                });
                const data = await res.json();
                alert("Alerte envoyée aux services de sécurité.");
            }
        }

        // FONCTION PRESTATAIRE : Il envoie sa position
        function demarrerSuiviGPS() {
            if (navigator.geolocation) {
                console.log("[GPS DEVICE] Initialisation du suivi haute précision...");
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const accuracy = pos.coords.accuracy;

                    // Ignorer les points imprécis (souvent des erreurs de triangulation wifi/antenne)
                    if (accuracy > 60) return;

                    lastLat = latitude; lastLon = longitude;
                    console.log(`[GPS DEVICE] MAJ Position : ${latitude}, ${longitude} (Précision: ${accuracy}m)`);

                    // On met à jour le marqueur correspondant au rôle
                    if (isProvider) {
                        markerProvider.setLatLng([latitude, longitude]);
                        // NAVIGATION ACTIVE : La carte suit le prestataire
                        map.panTo([latitude, longitude]);
                    } else {
                        markerClient.setLatLng([latitude, longitude]);
                        // Pour le client, on centre seulement au premier signal
                        if (!markerClient.getLatLng().lat) map.setView([latitude, longitude], 16);
                    }

                    // Déclenche la vérification de proximité
                    verifierDistance(latitude, longitude);

                    fetch('/sauvegarder-position', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat: latitude, lon: longitude })
                    });
                }, () => {}, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
            }
        }

        // LE CLIENT suit le PRESTATAIRE
        function demarrerPollingPrestataireGPS() {
            setInterval(async () => {
                console.log("[POLLING] Récupération position prestataire...");
                // Passage du missionId obligatoire pour éviter les bugs de session
                const res = await fetch('/api/suivi-prestataire-gps?missionId=' + missionId);
                const pos = await res.json();
                if (pos.lat && pos.lon) {
                    console.log("[POLLING PRESTA] Position reçue:", pos);
                    const newPos = [pos.lat, pos.lon];
                    markerProvider.setLatLng(newPos).bindPopup("Prestataire en mouvement...").openPopup();
                    if (!isProvider && !map.getBounds().contains(newPos)) map.panTo(newPos);
                    
                    // Optionnel : on peut essayer de récupérer la photo si elle n'est pas en session
                    if (!isProvider) {
                        fetch('/prestataire-public/' + missionId).then(r => r.json()).then(p => {
                            if (p.photo) document.getElementById('partner-photo-suivi').src = p.photo;
                        }).catch(() => {});
                    }

                    document.getElementById('gps-info').innerText = `🛵 Votre prestataire est en route.`;
                } else {
                    console.warn("[POLLING] Aucune position reçue du serveur pour le prestataire.");
                }
            }, 2000);
        }

        // LE PRESTATAIRE suit le CLIENT
        function demarrerPollingClientGPS() {
            setInterval(async () => {
                const res = await fetch('/api/suivi-client-gps?missionId=' + missionId);
                const pos = await res.json();
                if (pos.lat && pos.lon) {
                    clientPos = pos;
                    
                    // Mise à jour de la photo du client pour le prestataire
                    if (isProvider && !document.getElementById('partner-photo-suivi').src.includes('http')) {
                        fetch('/api/mes-missions-prestataire').then(r => r.json()).then(missions => {
                            const m = missions.find(x => x.id == missionId);
                            if (m && m.client && m.client.photo) document.getElementById('partner-photo-suivi').src = m.client.photo;
                        });
                    }

                    markerClient.setLatLng([pos.lat, pos.lon]).bindPopup("Position du client").openPopup();
                    document.getElementById('gps-info').innerText = `📍 Itinéraire vers le client mis à jour.`;

                    // Cas particulier : si le prestataire est déjà là (moins de 50m)
                    // On force la vérification dès qu'on reçoit la position du client
                    if (isProvider && lastLat && lastLon) {
                        verifierDistance(lastLat, lastLon);
                    }
                }
            }, 2000);
        }
    </script>
