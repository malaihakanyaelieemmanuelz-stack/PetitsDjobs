<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Suivi GPS & Sécurité</title>
</head>
<body>
    <header class="home-header"><h1>SÉCURITÉ PRESTATAIRE</h1></header>
    
    <div class="app-wrap" style="padding:20px;">
        <div class="gps-banner" id="banner-text">
            <strong>🛡️ Protection & Suivi</strong>
            Mise en relation et suivi GPS sécurisé.
        </div>

        <div class="checkout-card" style="text-align: center;">
            <h2 id="status-mission">Initialisation...</h2>
            <p id="mission-info" style="color:#666;">Vérification du statut de la mission.</p>
            
            <!-- Zone de la carte -->
            <div id="map"></div>

            <div id="gps-info" style="font-weight: bold; margin: 20px 0; color: #5D4037;">
                Calcul de l'itinéraire...
            </div>

            <button id="btn-sos" onclick="declencherSOS()" class="btn-danger" style="display:none; background:#b71c1c; font-size:1.2rem; padding:20px; margin-bottom: 20px;">
                🆘 EN DANGER
            </button>

            <button id="btn-fini" onclick="ouvrirModalFin()" class="btn-primary-sm" style="display:none; background:#2e7d32; width: 100%;">
                J'AI FINI ET JE SUIS EN SÉCURITÉ
            </button>
        </div>
    </div>

    <!-- Modal de confirmation par mot de passe -->
    <div id="modal-confirm" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:9999;">
        <div class="login-card" style="margin:20px;">
            <h3>Confirmer votre sécurité</h3>
            <p>Entrez votre mot de passe pour confirmer la fin de la mission.</p>
            <input type="password" id="confirm-pwd" placeholder="VOTRE MOT DE PASSE" style="margin-bottom:15px;">
            <button onclick="validerFin()" class="btn-primary-sm">VALIDER</button>
            <button onclick="document.getElementById('modal-confirm').style.display='none'" style="background:none; border:none; margin-top:10px; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        let markerClient;
        let isProvider = false;
        let missionId = null;
        let lastLat = null;
        let lastLon = null;

        // Initialisation de la carte (vue par défaut sur une position neutre)
        function initMap() {
            map = L.map('map').setView([0, 0], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            marker = L.marker([0, 0]).addTo(map);
            markerClient = L.marker([0, 0], { 
                icon: L.divIcon({ className: 'custom-icon', html: '🏠', iconSize: [30, 30] }) 
            }).addTo(map);
        }

        initMap();

        // Vérifier qui est l'utilisateur (Prestataire ou Client)
        fetch('/get-user-data').then(r => r.json()).then(user => {
            fetch('/get-session-commande').then(r => r.json()).then(cmd => {
                missionId = cmd.missionId;
                // Si l'utilisateur connecté est le prestataire de cette mission précise
                if (user.id === cmd.prestataireId) {
                   isProvider = true;
                   document.getElementById('btn-sos').style.display = 'block';
                   document.getElementById('btn-fini').style.display = 'block';
                   document.getElementById('status-mission').innerText = "Mission en cours";
                   document.getElementById('mission-info').innerText = "Rendez-vous chez le client.";
                   demarrerSuiviGPS();
                   demarrerPollingClientGPS(); // Le prestataire suit le client
                } else {
                    attendreAcceptationPrestataire();
                }
            });
        });

        function attendreAcceptationPrestataire() {
            const debutAttente = Date.now();
            const timer = setInterval(async () => {
                // Vérification du délai d'une minute (60 000 ms)
                if (Date.now() - debutAttente > 60000) {
                    clearInterval(timer);
                    alert("Le prestataire n'a pas répondu dans le délai imparti (1 minute). Veuillez choisir un autre prestataire disponible.");
                    window.location.href = '/choisir-prestataire';
                    return;
                }

                const res = await fetch('/api/statut-mission');
                const data = await res.json();
                if (data.statut === 'en_route') {
                    clearInterval(timer);
                    document.getElementById('status-mission').innerText = "Prestataire en route";
                    document.getElementById('mission-info').innerText = "Suivez son arrivée sur la carte.";
                    demarrerPollingPrestataireGPS(); // Le client suit le prestataire
                } else if (data.statut === 'refuse') {
                    clearInterval(timer);
                    alert("Le prestataire a refusé la mission.");
                    window.location.href = '/choisir-prestataire';
                }
            }, 3000);
        }

        // Charger les infos de la mission
        fetch('/get-session-commande')
            .then(r => r.json())
            .then(cmd => {
                if (cmd.prestataireNom) {
                    const nom = [cmd.prestatairePrenom, cmd.prestataireNom].filter(Boolean).join(' ');
                    document.getElementById('status-mission').innerText = `Mission avec ${nom}`;
                    document.querySelector('.checkout-card p').innerText = `Service : ${cmd.service} (${cmd.total} FCFA payés)`;
                }
            });

        function declencherSOS() {
            if(confirm("DÉCLENCHER L'ALERTE ? Une notification d'urgence sera envoyée avec votre position.")) {
                fetch('/alerte-sos', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: lastLat, lon: lastLon })
                })
                    .then(r => r.json())
                    .then(data => alert(data.message));
            }
        }

        function ouvrirModalFin() {
            document.getElementById('modal-confirm').style.display = 'flex';
        }

        async function validerFin() {
            const password = document.getElementById('confirm-pwd').value;
            if(!password) return alert("Mot de passe requis");

            const res = await fetch('/valider-fin-tache', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });

            const data = await res.json();
            if(res.ok) {
                alert(data.message);
                window.location.href = '/index.html';
            } else {
                alert(data.error);
            }
        }

        // FONCTION PRESTATAIRE : Il envoie sa position
        function demarrerSuiviGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    lastLat = latitude; lastLon = longitude;
                    
                    map.setView([latitude, longitude], 16);
                    marker.setLatLng([latitude, longitude]).bindPopup("Vous êtes ici").openPopup();
                    document.getElementById('gps-info').innerText = `📍 Ma position : ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;

                    fetch('/sauvegarder-position', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat: latitude, lon: longitude })
                    });
                }, () => {}, { enableHighAccuracy: true });
            }
        }

        // FONCTION CLIENT : Il reçoit la position du prestataire
        function demarrerPollingClient() {
            setInterval(async () => {
                const res = await fetch('/api/suivi-prestataire-gps');
                const pos = await res.json();
                if (pos.lat && pos.lon) {
                    const newPos = [pos.lat, pos.lon];
                    map.setView(newPos, 16);
                    marker.setLatLng(newPos).bindPopup("Votre prestataire arrive...").openPopup();
                    document.getElementById('gps-info').innerText = `🛵 Votre prestataire est en route.`;
                }
            }, 5000); // Mise à jour toutes les 5 secondes pour le client
        }
    </script>
</body>
</html>
