<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%238B4513'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%238B4513'/%3E%3Cpath d='M15 50 L95 50' stroke='%23000000' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%23000000' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Mon Profil</title>
    <style>
        /* Style spécifique pour le plein écran Android */
        .profile-container {
            min-height: 100dvh;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }
        .info-label {
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        .section-title {
            color: #5D4037;
            font-size: 1.3rem;
            margin: 25px 0 15px;
            font-weight: 800;
        }
        .action-block {
            margin-bottom: 30px;
        }
        .danger-zone {
            margin-top: auto;
            background: #fff5f5;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #ffcdd2;
        }
    </style>
</head>
<body style="background:transparent; margin:0;">
    <div class="profile-container">
        <!-- Header Immersif -->
        <div class="profile-header">
            <button onclick="location.href='index.html'" class="btn-outline" style="min-height:60px; width:60px; padding:0;">←</button>
            <h2 style="margin:0; color:#5D4037; font-weight:900;">MON COMPTE</h2>
            <form action="/deconnexion" method="POST">
                <button type="submit" class="btn-outline" style="color:#c62828; border-color:#c62828; min-height:60px; width:60px; padding:0;">OFF</button>
            </form>
        </div>

        <!-- Infos Utilisateur -->
        <div class="info-card">
            <div class="info-label">Identité</div>
            <div class="info-value"><span id="prenom">-</span> <span id="nom" style="text-transform:uppercase;">-</span></div>
            <div style="margin-top:10px;" class="info-label">E-mail</div>
            <div class="info-value" id="email" style="font-size:1rem;">-</div>
        </div>

        <!-- Section Client -->
        <div class="action-block">
            <div class="section-title">BESOIN D'UN SERVICE ?</div>
            <button onclick="location.href='index.html'" class="btn-primary-sm" style="width:100%; min-height:65px; font-size:1.2rem;">
                COMMANDER MAINTENANT
            </button>
        </div>

        <!-- Section Prestataire -->
        <div class="action-block">
            <div class="section-title">VOTRE TRAVAIL</div>
            <button id="btn-devenir" onclick="location.href='/prestataire'" class="btn-outline" style="width:100%; min-height:65px; font-size:1.2rem;">
                DEVENIR PRESTATAIRE
            </button>
            <button id="btn-espace" onclick="location.href='/prestataire-info'" class="btn-primary-sm" style="display:none; width:100%; min-height:65px; font-size:1.2rem; background:#333;">
                MA CARTE DE VISITE
            </button>
        </div>

        <!-- Zone Critique -->
        <div class="danger-zone">
            <div class="info-label" style="color:#c62828; margin-bottom:10px;">Options de compte</div>
            <button id="btn-supprimer-carte" onclick="supprimerMaCarte()" class="btn-danger" style="display:none; width:100%; margin-bottom:10px; background:#f44336; min-height:60px;">SUPPRIMER MA CARTE</button>
            <button onclick="supprimerCompte()" class="btn-danger" style="width:100%; min-height:60px;">SUPPRIMER MON COMPTE</button>
        </div>
    </div>

    <script>
        fetch('/get-user-data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('nom').innerText = data.nom || '-';
                document.getElementById('prenom').innerText = data.prenom || '-';
                document.getElementById('email').innerText = data.email || '-';
                if (data.isPrestataire) {
                    document.getElementById('btn-devenir').style.display = 'none';
                    document.getElementById('btn-espace').style.display = 'block';
                    document.getElementById('btn-supprimer-carte').style.display = 'block';
                }
            });

        async function supprimerMaCarte() {
            if (confirm("Voulez-vous supprimer votre carte de visite ? Vous ne serez plus visible comme prestataire mais vous garderez votre compte client.")) {
                const res = await fetch('/supprimer-profil-prestataire', { method: 'POST' });
                const data = await res.json();
                alert(data.message || data.error);
                if (res.ok) window.location.reload();
            }
        }

        async function supprimerCompte() {
            if (confirm("⚠️ Êtes-vous sûr ? Votre compte et vos données seront définitivement supprimés. Cette action est irréversible.")) {
                const res = await fetch('/supprimer-compte', { method: 'POST' });
                const data = await res.json();
                alert(data.message || data.error);
                if (res.ok) window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
