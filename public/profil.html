<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg transform='rotate(-30 50 50)'%3E%3Crect x='20' y='20' width='20' height='60' fill='%23FF6600'/%3E%3Crect x='50' y='30' width='30' height='40' fill='%23FF6600'/%3E%3Cpath d='M15 50 L95 50' stroke='%232e7d32' stroke-width='12' stroke-dasharray='3 3'/%3E%3Cpath d='M50 15 L50 85' stroke='%232e7d32' stroke-width='2' stroke-dasharray='1 1'/%3E%3Ctext x='55' y='75' font-family='monospace' font-size='5' font-weight='bold' fill='%23FFFFFF'%3Epd%3C/text%3E%3C/g%3E%3C/svg%3E">
    <title>Mon Profil</title>
    <style>
        /* Style spécifique pour le plein écran Android */
        .profile-container {
            flex: 1;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }
        .info-label {
            color: #2e7d32;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2e7d32;
        }
        .section-title {
            color: #2e7d32;
            font-size: 1.3rem;
            margin: 25px 0 15px;
            font-weight: 800;
        }
        .action-block {
            margin-bottom: 30px;
        }
        .danger-zone {
            margin-top: auto;
            background: #fff5f5;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #ffcdd2;
        }
    </style>
</head>
<body style="background:transparent; margin:0; display: flex; flex-direction: column; min-height: 100dvh;">
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none; display:block; margin:0;">
                <h1 style="margin:0;">
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#FF6600"/>
                            <rect x="50" y="30" width="30" height="40" fill="#FF6600"/>
                            <path d="M15 50 L95 50" stroke="#2e7d32" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#2e7d32" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="index.html">ACCUEIL</a>
            </nav>
        </div>
    </header>

    <div class="profile-container">
        <h2 style="margin: 10px 0 30px; color:#000000; font-weight:900; text-align: center;">MON COMPTE</h2>

        <!-- Photo de Profil Interactive -->
        <div style="text-align: center; margin-bottom: 25px;">
            <img id="user-photo-profil" src="default-profile.png" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid #FF6600; object-fit: cover; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" onclick="document.getElementById('input-photo-profil').click()">
            <input type="file" id="input-photo-profil" style="display: none;" accept="image/*" onchange="changerPhotoProfil(this)">
            <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">Appuyez pour changer de photo</p>
        </div>

        <!-- Infos Utilisateur -->
        <div class="info-card">
            <div class="info-label">Identité</div>
            <div class="info-value"><span id="prenom">-</span> <span id="nom" style="text-transform:uppercase;">-</span></div>
            <div style="margin-top:10px;" class="info-label">E-mail</div>
            <div class="info-value" id="email" style="font-size:1rem;">-</div>
        </div>

        <!-- Bouton de validation de fin de mission (Apparaît si mission finie mais départ non validé) -->
        <div id="zone-depart-urgent" style="display:none; margin-bottom:20px;">
            <button onclick="location.href='/suivi'" class="btn-primary-sm" style="background:#FF6600; width:100%; border:3px solid #ff9800;">
                📢 VALIDER LE DÉPART DU PRESTATAIRE
            </button>
        </div>

        <!-- Section Client -->
        <div class="action-block">
            <div class="section-title">BESOIN D'UN SERVICE ?</div>
            <button onclick="location.href='index.html'" class="btn-primary-sm" style="width:100%; min-height:65px; font-size:1.2rem;">
                COMMANDER MAINTENANT
            </button>
        </div>

        <!-- Section Sociale -->
        <div class="action-block">
            <div class="section-title">COMMUNAUTÉ</div>
            <button onclick="location.href='/amis.html'" class="btn-primary-sm" style="width:100%; min-height:65px; font-size:1.2rem; background:#2e7d32; position: relative;">
                👥 MES AMIS & CHAT
                <span id="amis-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#FF6600; color:white; border-radius:50%; width:24px; height:24px; font-size:0.8rem; border:2px solid white; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </button>
        </div>

        <!-- Section Prestataire -->
        <div class="action-block">
            <div class="section-title">VOTRE TRAVAIL</div>
            <button id="btn-devenir" onclick="location.href='/prestataire'" class="btn-outline" style="width:100%; min-height:80px; font-size:1.6rem; font-weight:bold;">
                DEVENIR PRESTATAIRE
            </button>
            <button id="btn-espace" onclick="location.href='/prestataire-info'" class="btn-primary-sm" style="display:none; width:100%; min-height:85px; font-size:1.8rem; background:#FF6600; color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 12px rgba(255,102,0,0.3);">
                📇 MA CARTE DE VISITE
            </button>
        </div>

        <!-- Zone Critique -->
        <div class="danger-zone">
            <div class="info-label" style="color:#c62828; margin-bottom:10px;">Options de compte</div>
            <button id="btn-supprimer-carte" onclick="supprimerMaCarte()" class="btn-danger" style="display:none; width:100%; margin-bottom:10px; background:#f44336; min-height:60px;">SUPPRIMER MA CARTE</button>
            <button onclick="supprimerCompte()" class="btn-danger" style="width:100%; min-height:60px;">SUPPRIMER MON COMPTE</button>
        </div>

        <div style="text-align:center; margin-top:30px; padding-bottom: 30px;">
            <a href="index.html" style="color:#2e7d32; font-weight:bold; font-size: 1.1rem; text-decoration: none; border: 2px solid #2e7d32; padding: 12px 30px; border-radius: 12px; display: inline-block; background: white;">← RETOUR À L'ACCUEIL</a>
        </div>
    </div>

    <script>
        fetch('/get-user-data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('nom').innerText = data.nom || '-';
                document.getElementById('prenom').innerText = data.prenom || '-';
                document.getElementById('email').innerText = data.email || '-';
                if (data.photo) document.getElementById('user-photo-profil').src = data.photo;
                if (data.isPrestataire) {
                    document.getElementById('btn-devenir').style.display = 'none';
                    document.getElementById('btn-espace').style.display = 'block';
                    document.getElementById('btn-supprimer-carte').style.display = 'block';
                }

                // Vérifier s'il y a une mission en attente de départ
                fetch('/api/mes-commandes-futures').then(r => r.json()).then(missions => {
                    const active = missions.find(m => m.statut === 'attente_securite');
                    if (active) {
                        document.getElementById('zone-depart-urgent').style.display = 'block';
                    }
                });

                // Vérifier les invitations d'amis pour le badge
                fetch('/api/mes-demandes-amis').then(r => r.json()).then(invits => {
                    if (invits && invits.length > 0) {
                        const badge = document.getElementById('amis-badge');
                        badge.innerText = invits.length;
                        badge.style.display = 'flex';
                    }
                });
            });

        async function changerPhotoProfil(input) {
            if (!input.files || !input.files[0]) return;
            const formData = new FormData();
            formData.append('photo', input.files[0]);
            
            const res = await fetch('/api/update-profile-photo', {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('user-photo-profil').src = data.url;
                alert("Photo mise à jour !");
            }
        }

        async function supprimerMaCarte() {
            if (confirm("Voulez-vous supprimer votre carte de visite ? Vous ne serez plus visible comme prestataire mais vous garderez votre compte client.")) {
                const res = await fetch('/supprimer-profil-prestataire', { method: 'POST' });
                const data = await res.json();
                alert(data.message || data.error);
                if (res.ok) window.location.reload();
            }
        }

        async function supprimerCompte() {
            if (confirm("⚠️ Êtes-vous sûr ? Votre compte et vos données seront définitivement supprimés. Cette action est irréversible.")) {
                const res = await fetch('/supprimer-compte', { method: 'POST' });
                const data = await res.json();
                alert(data.message || data.error);
                if (res.ok) window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
