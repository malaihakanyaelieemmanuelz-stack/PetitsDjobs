<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Récupération de mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a>
    </header>
    <div class="auth-page" style="padding: 50px 20px;">
        <div class="login-card">
            <h1>RÉCUPÉRATION</h1>
            <p style="color:#666; margin-bottom:20px;">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
            <form id="recoveryForm">
                <input type="email" name="email" id="recovery-email" placeholder="VOTRE EMAIL" required>
                <button type="submit">ENVOYER LE LIEN</button>
            </form>
            <p id="msg-retour" style="margin-top:20px; display:none; color:#2e7d32; font-weight:bold;"></p>
            <a href="connexion.html" style="display:block; margin-top:20px; color:#5D4037; font-weight:bold;">← Retour à la connexion</a>
        </div>
    </div>
    <script>
        document.getElementById('recoveryForm').onsubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('recovery-email').value;
            const msg = document.getElementById('msg-retour');
            
            const res = await fetch('/api/mot-de-passe-oublie', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            
            if (res.ok) {
                alert("Un code de vérification vous a été envoyé par email.");
                window.location.href = `/reinitialiser-mdp?email=${encodeURIComponent(email)}`;
            } else {
                const errData = await res.json();
                alert("Erreur: " + (errData.error || "Une erreur est survenue."));
            }
        }
    </script>
</body>
</html>
