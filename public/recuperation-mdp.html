<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/favicon.png?v=2">
    <title>Récupération de mot de passe - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content">
            <a href="index.html" style="text-decoration:none;">
                <h1>
                    <svg class="home-logo" viewBox="0 0 100 100">
                        <g transform="rotate(-30 50 50)">
                            <rect x="20" y="20" width="20" height="60" fill="#8B4513"/>
                            <rect x="50" y="30" width="30" height="40" fill="#8B4513"/>
                            <path d="M15 50 L95 50" stroke="#FFFFFF" stroke-width="12" stroke-dasharray="3 3"/>
                            <path d="M50 15 L50 85" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="1 1"/>
                            <text x="55" y="75" font-family="monospace" font-size="5" font-weight="bold" fill="#FFFFFF">pd</text>
                        </g>
                    </svg>
                    PETITSDJOBS
                </h1>
            </a>
            <nav class="nav-compact">
                <a href="connexion.html">CONNEXION</a>
                <a href="inscription.html">INSCRIPTION</a>
            </nav>
        </div>
    </header>
    <div class="auth-page">
        <div class="login-card">
            <h1>RÉCUPÉRATION</h1>
            <p style="color:#666; margin-bottom:20px;">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
            <form id="recoveryForm">
                <input type="email" name="email" id="recovery-email" placeholder="VOTRE EMAIL" required>
                <button type="submit">ENVOYER LE LIEN</button>
            </form>
            <p id="msg-retour" style="margin-top:20px; display:none; color:#2e7d32; font-weight:bold;"></p>
            <a href="connexion.html" style="display:block; margin-top:20px; color:#5D4037; font-weight:bold;">← Retour à la connexion</a>
        </div>
    </div>
    <script>
        document.getElementById('recoveryForm').onsubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('recovery-email').value;
            const msg = document.getElementById('msg-retour');
            
            const res = await fetch('/api/mot-de-passe-oublie', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            
            if (res.ok) {
                alert("Un code de vérification vous a été envoyé par email.");
                window.location.href = `/reinitialiser-mdp?email=${encodeURIComponent(email)}`;
            } else {
                const errData = await res.json();
                alert("Erreur: " + (errData.error || "Une erreur est survenue."));
            }
        }
    </script>
</body>
</html>
