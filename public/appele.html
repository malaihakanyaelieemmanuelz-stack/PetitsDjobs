<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact Prestataire - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header">
        <div class="header-content"><a href="index.html" style="text-decoration:none;"><h1>PETITSDJOBS</h1></a></div>
    </header>
    <div class="app-wrap" style="text-align: center; margin-top: 50px;">
        <h2 style="color: #FF6600;">Contactez votre prestataire</h2>
        <div class="card" style="width: 100%; max-width: 400px; margin: 20px auto; padding: 20px;">
            <h3>Appel via Connexion (Gratuit)</h3>
            <p style="font-size: 0.9rem; color: #666;">Passez un appel 100% gratuit via internet.</p>
            <button class="btn-primary-sm" onclick="alert('Lancement de l\'appel internet...')">APPELER GRATUITEMENT</button>
        </div>
        <div class="card" style="width: 100%; max-width: 400px; margin: 20px auto; padding: 20px;">
            <h3>Appel Direct</h3>
            <p style="font-size: 0.9rem; color: #666;">Appel classique via votre opérateur.</p>
            <div id="direct-call-input">
                <input type="tel" id="client-phone" placeholder="Saisissez votre numéro" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
                <button class="btn-secondary-green" onclick="revelerNumero()">VOIR LE NUMÉRO DU PRO</button>
            </div>
            <div id="result-numero" style="display:none; margin-top:15px; font-weight:bold; font-size:1.1rem;"></div>
        </div>
    </div>
    <script>
        async function revelerNumero() {
            if (!document.getElementById('client-phone').value) return alert("Saisissez votre numéro d'abord.");
            const resStatus = await fetch('/get-session-commande');
            const cmd = await resStatus.json();
            const res = await fetch('/get-prestataire-contact/' + cmd.prestataireId);
            const resultDiv = document.getElementById('result-numero');
            if (res.ok) {
                const data = await res.json();
                resultDiv.innerHTML = `<span style="color:#2e7d32;">Numéro : ${data.telephone}</span><br><a href="tel:${data.telephone}" class="btn-primary-sm" style="display:block; margin-top:10px; text-decoration:none;">APPELER</a>`;
            } else {
                resultDiv.innerHTML = `<span style="color:#FF6600;">Le prestataire ne souhaite pas que son numéro soit divulgué.</span>`;
            }
            document.getElementById('direct-call-input').style.display = 'none';
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
