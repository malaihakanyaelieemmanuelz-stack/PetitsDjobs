<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Statut Prestataire - PETITSDJOBS</title>
</head>
<body>
    <header class="home-header"><h1>PETITSDJOBS</h1></header>
    <div class="app-wrap" style="text-align:center; padding-top:50px;">
        <h2>GESTION DE DISPONIBILITÉ</h2>
        <p style="color:#c62828; font-weight:bold; margin: 20px 0; padding:15px; border:1px solid #c62828; border-radius:8px;">
            ⚠️ RAPPEL JURIDIQUE : Toute entente directe entre vous et l'employeur pour effectuer 
            le service sans passer par le site est passible de poursuites judiciaires.
        </p>
        
        <div style="display:flex; flex-direction:column; gap:20px; max-width:350px; margin:0 auto;">
            <button onclick="window.location.href='/connexion.html'" style="background:#2e7d32; color:white; padding:20px; border-radius:12px; font-weight:bold; border:none; cursor:pointer; font-size:1.1rem;">
                ✅ DISPONIBLE<br><small style="font-weight:normal;">(Se connecter pour être visible)</small>
            </button>
            
            <button onclick="marquerOccupe()" style="background:#333; color:white; padding:20px; border-radius:12px; font-weight:bold; border:none; cursor:pointer; font-size:1.1rem;">
                🚫 OCCUPÉ<br><small style="font-weight:normal;">(Rester hors ligne)</small>
            </button>
        </div>
    </div>

    <script>
        function marquerOccupe() {
            alert("Vous avez été marqué comme occupé.");
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
